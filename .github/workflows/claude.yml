name: Claude

# Mention @claude in an issue, an issue/PR comment, or a PR review and Claude
# Code runs in GitHub Actions: it reads the thread, makes changes on a branch,
# and opens/updates a PR. Lets you maintain the app from your phone (GitHub
# mobile app or browser) with no dependency on the Mac mini being online.
#
# Requires a repo secret named ANTHROPIC_API_KEY (Settings -> Secrets and
# variables -> Actions). Public repo => Actions minutes are free; you pay only
# for Claude API usage on the key.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Only run when someone actually writes @claude (avoids burning API calls
    # on every comment/issue).
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
