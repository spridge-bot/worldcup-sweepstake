name: Update sweepstake scores

on:
  schedule:
    # Every 3 hours during the tournament (11 Jun - 19 Jul 2026).
    # Match days run late in North American time zones, so frequent polling
    # catches each day's results by the following morning.
    - cron: "30 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch results and recompute scores
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python scripts/update_scores.py

      - name: Commit updated data
        run: |
          git config user.name "sweepstake-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || (git commit -m "Update scores" && git push)
