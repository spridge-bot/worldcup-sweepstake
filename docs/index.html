<body>
<div class="wrap">
  <header>
    <div class="kick">United 2026 · USA · Canada · Mexico</div>
    <h1><span class="ball">⚽</span> World Cup Sweepstake</h1>
    <div class="pitchline"></div>
    <div class="sub" id="updated">Loading…</div>
  </header>
  <div class="banner" id="banner"></div>
  <div id="live"></div>

  <nav>
    <button data-tab="news" class="active">📰 News</button>
    <button data-tab="leaderboard">Leaderboard</button>
    <button data-tab="podium">Podium</button>
    <button data-tab="projection">🔮 Projection</button>
    <button data-tab="results">Results</button>
    <button data-tab="fixtures">Fixtures</button>
    <button data-tab="groups">Groups</button>
    <button data-tab="bracket">Bracket</button>
    <button data-tab="teams">Teams</button>
    <button data-tab="scorers">Golden Boot</button>
    <button data-tab="fairplay">Fair Play</button>
    <button data-tab="rules">Rules</button>
    <a class="navlink" href="draw.html">🎡 The Draw</a>
  </nav>

  <section id="leaderboard"></section>
  <section id="podium"></section>
  <section id="projection"></section>
  <section id="news" class="active"></section>
  <section id="results"></section>
  <section id="fixtures"></section>
  <section id="groups"></section>
  <section id="bracket"></section>
  <section id="teams"></section>
  <section id="scorers"></section>
  <section id="fairplay"></section>
  <section id="rules"></section>

  <footer>SCORES UPDATE AUTOMATICALLY · GROUP POSITION 5·3·1·0 · KNOCKOUT WINS 2·3·4·5·6</footer>
</div>

<script>
const $ = sel => document.querySelector(sel);
let DETAILS = {}, SOFA = {};

document.querySelectorAll('nav button').forEach(b => b.onclick = () => {
  document.querySelectorAll('nav button').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('section').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  $('#' + b.dataset.tab).classList.add('active');
  if (typeof renderSection === 'function') renderSection(b.dataset.tab);   // fresh on arrival
  b.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt = n => (n % 1 === 0 ? n.toFixed(0) : n.toFixed(1));
const MEDALS = {1: '🥇', 2: '🥈', 3: '🥉'};

function chip(team) {
  const cls = team.status === 'out' ? ' out' : team.status === 'champion' ? ' champion' : '';
  return `<span class="chip${cls}">${team.flag} ${esc(team.name)}
          <span class="tier t${team.tier}">T${team.tier}</span></span>`;
}

function duelStrip(a, b) {
  if (!a && !b) return '';
  return `<div class="duelstrip">${esc(a || '—')}<i>v</i>${esc(b || '—')}</div>`;
}

function movement(mv) {
  if (mv > 0) return `<span class="mv-up">▲${mv}</span>`;
  if (mv < 0) return `<span class="mv-down">▼${-mv}</span>`;
  return `<span class="mv-flat">–</span>`;
}

/* ---------------- leaderboard ---------------- */
function renderLeaderboard(d) {
  const rows = d.players.map(p => {
    const teams = p.teams.map(c => {
      const t = d.teams[c];
      const cls = t.status === 'out' ? ' out' : t.status === 'champion' ? ' champion' : '';
      return `<span class="lbteam${cls}">${t.flag} ${esc(t.name)}</span>`;
    }).join('');
    const today = p.today > 0 ? `<span class="today-pos">+${fmt(p.today)}</span>`
                : p.today < 0 ? fmt(p.today) : '<span class="mv-flat">–</span>';
    const medal = p.total > 0 && MEDALS[p.rank] ? MEDALS[p.rank] + ' ' : '';
    return `<tr class="${p.rank === 1 && p.total > 0 ? 'top1' : ''}">
      <td class="rank num">${medal || p.rank}</td>
      <td class="pcell">
        <div class="pname"><b>${esc(p.name)}</b> ${movement(p.movement)}</div>
        <div class="lbteams">${teams}</div></td>
      <td class="num">${today}</td>
      <td class="num total">${fmt(p.total)}</td></tr>`;
  }).join('');
  $('#leaderboard').innerHTML = `<table class="lbtable">
    <tr><th class="num">#</th><th>Player &amp; teams</th>
    <th class="num">Latest</th><th class="num">Total</th></tr>${rows}</table>`;
}

/* ---------------- live hero ---------------- */
function liveIncidents(s) {
  if (!s?.incidents?.length) return '<div class="inc"><span class="min"></span><span class="who">Waiting for the first events…</span></div>';
  // only show period markers that matter; "1st/2nd half" labels are structural noise
  const periodText = t => {
    const x = String(t || '').trim();
    if (/^ht$/i.test(x) || /half.?time/i.test(x)) return 'Half-time';
    if (/^ft$/i.test(x) || /full.?time/i.test(x)) return 'Full-time';
    if (/^aet$/i.test(x) || /after extra/i.test(x)) return 'After extra time';
    if (/penalt/i.test(x)) return 'Penalty shootout';
    if (/extra/i.test(x)) return x;            // "Extra time" etc.
    return null;                               // "First half" / "Second half" → drop
  };
  const order = i => (i.minute || 0) + (i.addedTime || 0) * 0.01;   // real chronological order
  return [...s.incidents].sort((a, b) => order(b) - order(a)).map(i => {
    const min = i.minute != null ? `${i.minute}${i.addedTime ? '+' + i.addedTime : ''}'` : '';
    let icon = '·', txt = esc(i.text || i.class || i.type || ''), big = false;
    if (i.type === 'goal') {
      big = true; icon = '⚽';
      txt = `<b>GOAL!</b> ${esc(i.player || '')}` +
        (i.class === 'penalty' ? ' (pen)' : i.class === 'ownGoal' ? ' (og)' : '') +
        (i.assist ? ` <span class="who">assist: ${esc(i.assist)}</span>` : '') +
        (i.homeScore != null ? ` <b>${i.homeScore}–${i.awayScore}</b>` : '');
    } else if (i.type === 'card') {
      icon = (i.class === 'red' || i.class === 'yellowRed') ? '🟥' : '🟨';
      txt = esc(i.player || '');
    } else if (i.type === 'substitution') {
      icon = '🔁';
      txt = `<span style="color:var(--green)">${esc(i.in || '')}</span>
        <span class="who">for</span> <span style="color:var(--red)">${esc(i.out || '')}</span>`;
    } else if (i.type === 'period') {
      const pt = periodText(i.text);
      if (!pt) return '';                       // skip structural half labels
      icon = '⏱'; big = true; txt = `<b>${pt}</b>`;
    } else if (i.type === 'penalty' || i.type === 'penaltyShootout') {   // shootout in knockouts
      const missed = i.scored === false || /miss|fail|saved/i.test(String(i.class || ''));
      icon = missed ? '❌' : '⚽';
      txt = `Shootout: ${esc(i.player || '')} ${missed ? 'missed' : 'scored'}` +
        (i.homeScore != null ? ` <b>${i.homeScore}–${i.awayScore}</b>` : '');
    } else if (i.type === 'injuryTime') { icon = '⏱'; txt = `+${i.length ?? ''} min added`;
    } else if (i.type === 'varDecision') { icon = '📺'; txt = `VAR: ${esc(i.text || i.class || '')}`; }
    return `<div class="inc${big ? ' big' : ''}"><span class="min">${min}</span><span>${icon} ${txt}</span></div>`;
  }).join('');
}

function shortName(n) {
  const p = String(n || '').trim().split(/\s+/);
  return p.length > 1 ? `${p[0][0]}. ${p.slice(1).join(' ')}` : (n || '');
}

// vertical depth + horizontal slot from a player's position label, so we place
// players by where they actually play rather than trusting the array order
function posDepth(pos) {
  const p = String(pos || '').toLowerCase();
  if (/goalkeep|^g$|^gk$/.test(p)) return 0;
  if (/back|defen|^d$|sweeper|wing.?back/.test(p)) return 1;
  if (/defensive mid|holding/.test(p)) return 2;
  if (/attacking mid|second striker/.test(p)) return 3.5;
  if (/midfield|^m$/.test(p)) return 3;
  if (/forward|strik|wing|^f$/.test(p)) return 5;
  return 3;
}
function posHoriz(pos) {
  const p = String(pos || '').toLowerCase();
  const c = /center|centre/.test(p);
  if (/\bleft\b/.test(p)) return c ? 1.5 : 0;
  if (/\bright\b/.test(p)) return c ? 2.5 : 4;
  return 2;
}
function formationPitch(sideData) {
  const lineup = sideData?.lineup || [], form = sideData?.formation;
  if (lineup.length < 11 || !form) return '';
  const counts = [1, ...String(form).split('-').map(n => parseInt(n, 10)).filter(Boolean)];
  if (counts.reduce((a, b) => a + b, 0) !== 11) return '';
  // order the XI by pitch depth (GK→DEF→MID→FWD), then left→right, then slice into the formation's lines
  const sorted = lineup.slice().sort((a, b) =>
    posDepth(a.position) - posDepth(b.position) || posHoriz(a.position) - posHoriz(b.position));
  let i = 0;
  const lines = counts.map(n => { const seg = sorted.slice(i, i + n); i += n; return seg; });
  const rows = [...lines].reverse().map(seg => `<div class="fmrow">${seg.map(p =>
    `<div class="fmplr"><span class="fmdot">${esc(String(p.shirt ?? ''))}</span>
      <span class="fmnm">${esc(shortName(p.name))}</span></div>`).join('')}</div>`).join('');
  return `<div class="fmpitch">${rows}</div>`;
}

function lineupBlock(id, home, away, label) {
  const s = SOFA[String(id)], det = DETAILS[String(id)];
  const lus = (det?.home?.lineup?.length || det?.away?.lineup?.length)
    ? { home: det.home, away: det.away, confirmed: true } : s?.lineups;
  if (!lus?.confirmed || !(lus.home?.lineup?.length || lus.away?.lineup?.length)) return '';
  const cmap = cardMap(id);
  const pitch = (formationPitch(lus.home) && formationPitch(lus.away)) ? `<div class="fmwrap">
    <div class="fmcol"><div class="fmteam">${home.flag} ${esc(home.name)} · ${esc(lus.home.formation || '')}</div>${formationPitch(lus.home)}</div>
    <div class="fmcol"><div class="fmteam">${away.flag} ${esc(away.name)} · ${esc(lus.away.formation || '')}</div>${formationPitch(lus.away)}</div>
  </div>` : '';
  return `<details class="lu"><summary>📋 ${label || 'Line-ups & formation'}</summary>
    ${pitch}
    <div class="lineups">${lineupSide(lus.home, home, cmap)}${lineupSide(lus.away, away, cmap)}</div>
  </details>`;
}

function tickClock(clock, detail, generatedAt) {
  // Show the feed clock as-is while data is fresh (the watcher refreshes it
  // every ~25s); only estimate forward when data goes stale, and cap the
  // estimate so devices with skewed clocks can't drift apart.
  const m = /^(\d+)/.exec(clock || '');
  if (!m || /HT|FT|AET|pen|half|full|break/i.test(detail || '')) return clock || detail || '';
  const elapsed = (Date.now() - new Date(generatedAt).getTime()) / 60000;
  if (elapsed < 1.5) return clock;
  return `~${parseInt(m[1], 10) + Math.min(Math.round(elapsed), 6)}'`;
}

// Big centred MM:SS match clock above the scoreline. The feed only gives whole
// minutes, so we anchor seconds the first time we see each minute value (per
// match) and let a 1s ticker count up — re-anchoring only when the minute
// changes, so the relay's ~12s refreshes don't keep resetting the seconds.
const CLOCK_ANCHORS = {};   // id -> { base, t0, cap } — game-seconds anchor that climbs in real time
function fmtClock(sec) {
  sec = Math.max(0, Math.floor(sec));
  return `${Math.floor(sec / 60)}:${String(sec % 60).padStart(2, '0')}`;
}
// Current ticking value for an anchor: climbs at 1s/s from when it was set,
// capped so a dead/stale feed can't run the clock away indefinitely.
function clockSec(a) { return Math.min(a.base + (Date.now() - a.t0) / 1000, a.cap); }
function matchClock(m) {
  const detail = m.status_detail || '';
  if (/\bHT\b|half.?time/i.test(detail)) return `<div class="matchclock paused">HALF&nbsp;TIME</div>`;
  if (/\bF?T\b|full.?time|\bAET\b|pen|final|ended/i.test(detail) && !/^\d/.test(detail))
    return `<div class="matchclock paused">${esc(detail)}</div>`;
  const mm = /(\d+)/.exec(m.clock || '');
  if (!mm) return detail ? `<div class="matchclock paused">${esc(detail)}</div>` : '';
  const add = /\+(\d+)/.exec(m.clock || '');
  const totalMin = parseInt(mm[1], 10) + (add ? parseInt(add[1], 10) : 0);
  const target = (totalMin - 1) * 60;           // game-seconds the feed minute implies
  const a = CLOCK_ANCHORS[m.id];
  // Re-anchor forward only (monotonic): jump up when the feed is ahead of us,
  // otherwise keep climbing — so stale data extrapolates instead of freezing,
  // and a late feed update never snaps the clock backwards.
  if (!a || target > clockSec(a))
    CLOCK_ANCHORS[m.id] = { base: Math.max(target, a ? clockSec(a) : 0), t0: Date.now(), cap: target + 360 };
  else
    a.cap = Math.max(a.cap, target + 360);      // only ever raise the runaway guard, never pull back
  return `<div class="matchclock" data-clock="${m.id}">${fmtClock(clockSec(CLOCK_ANCHORS[m.id]))}</div>`;
}
function tickClocks() {
  document.querySelectorAll('.matchclock[data-clock]').forEach(el => {
    const a = CLOCK_ANCHORS[el.dataset.clock];
    if (a) el.textContent = fmtClock(clockSec(a));
  });
}
setInterval(tickClocks, 1000);

// goals as {minute, addedTime, side:'home'|'away'} — prefer sofascore incidents, fall back to ESPN/details
function matchGoals(m, sofa, det) {
  const inc = (sofa?.incidents || []).filter(i => i.type === 'goal');
  if (inc.length) return inc.map(i => ({ minute: i.minute, addedTime: i.addedTime, side: i.team }));
  return (det?.goals || []).map(g => ({ minute: g.minute, addedTime: g.injury,
    side: g.team === m.home.code ? 'home' : 'away' }));
}

function momentumChart(s, homeName, awayName, goals) {
  const pts = s?.momentum;
  if (!pts?.length) return '';
  const maxMin = Math.max(90, ...pts.map(p => p.m));
  const bars = pts.map(p => {
    const x = (p.m / maxMin) * 300;
    const h = Math.min(Math.abs(p.v), 100) * 0.36;
    return `<rect x="${(x - 1.4).toFixed(1)}" y="${p.v > 0 ? (40 - h).toFixed(1) : 40}"
      width="2.8" height="${h.toFixed(1)}" rx="1"
      fill="${p.v > 0 ? '#36d97c' : '#f5c542'}" opacity=".85"/>`;
  }).join('');
  const gl = (goals && goals.length) ? goals
    : (s.incidents || []).filter(i => i.type === 'goal').map(i => ({ minute: i.minute, addedTime: i.addedTime, side: i.team }));
  const goalMarks = gl.map(g => {
    const x = (((g.minute || 0) + (g.addedTime || 0) * 0.1) / maxMin) * 300;
    const col = g.side === 'home' ? '#36d97c' : '#f5c542';
    // a dashed guide line across the whole chart + a ⚽ disc on the scoring
    // side, so the goal is unmistakably overlaid on the momentum trace
    return `<line x1="${x.toFixed(1)}" y1="2" x2="${x.toFixed(1)}" y2="78"
        stroke="${col}" stroke-width="0.9" stroke-dasharray="2 2" opacity=".75"/>
      <circle cx="${x.toFixed(1)}" cy="${g.side === 'home' ? 6 : 74}" r="4.4"
        fill="#fff" stroke="${col}" stroke-width="1.4"/>
      <text x="${x.toFixed(1)}" y="${g.side === 'home' ? 7.6 : 75.6}" text-anchor="middle"
        font-size="5.2" fill="#04150b">⚽</text>`;
  }).join('');
  return `<h4>Attack momentum</h4>
    <svg viewBox="0 0 300 80" style="width:100%;display:block;background:rgba(0,0,0,.18);border-radius:8px"
      preserveAspectRatio="none">
      <line x1="0" y1="40" x2="300" y2="40" stroke="rgba(255,255,255,.18)"/>
      ${bars}${goalMarks}
    </svg>
    <div style="display:flex;justify-content:space-between;font-size:.68rem;color:var(--dim);margin-top:3px">
      <span>▲ ${esc(homeName)} pressure</span><span>goals ⚪︎</span>
      <span>${esc(awayName)} pressure ▼</span></div>`;
}

function countdown(ms) {
  if (ms <= 0) return 'kicking off…';
  const h = Math.floor(ms / 3600e3), m = Math.round((ms % 3600e3) / 60000);
  return 'in ' + (h ? `${h}h ${m}m` : `${m}m`);
}

function matchDayTiles(d) {
  const now = Date.now();
  const tiles = [];
  // games already played today -> compressed, greyed out
  (d.results || [])
    .filter(r => now - new Date(r.utc).getTime() < 9 * 3600e3)
    .slice(0, 3)
    .forEach(r => tiles.push(`<div class="tile done" data-go="results">
      <span>${r.home.flag} ${esc(r.home.name)}
        <span class="score">${r.home.goals}–${r.away.goals}</span>
        ${esc(r.away.name)} ${r.away.flag}</span>
      <span class="label">FT · played${r.note ? esc(r.note) : ''}</span></div>`));
  // the next game, with kick-off time and countdown
  if (!d.live?.length) {
    const next = (d.upcoming || [])[0];
    if (next) {
      const ko = new Date(next.utc);
      const when = ko.toLocaleString(undefined,
        { weekday: 'short', hour: '2-digit', minute: '2-digit' });
      tiles.push(`<div class="tile next" data-go="fixtures">
        <span>${next.home.flag} ${esc(next.home.name)} <span class="score">v</span>
          ${esc(next.away.name)} ${next.away.flag}</span>
        <span class="label">next · ${when} · ${countdown(ko - now)}</span></div>`);
    }
  }
  return tiles.length ? `<div class="tilerow">${tiles.join('')}</div>` : '';
}

// unified live-events list: prefer Sofascore incidents, else rebuild from ESPN details
function incidentsFor(m, sofa, det) {
  const inc = sofa?.incidents || [];
  if (inc.length) return inc;
  const sideOf = code => code === m.home.code ? 'home' : 'away';
  const out = [];
  (det?.goals || []).forEach(g => out.push({ type: 'goal', minute: g.minute, addedTime: g.injury,
    player: g.scorer, assist: g.assist, team: sideOf(g.team),
    class: g.type === 'PENALTY' ? 'penalty' : g.type === 'OWN' ? 'ownGoal' : '' }));
  (det?.bookings || []).forEach(b => out.push({ type: 'card', minute: b.minute, player: b.player,
    team: sideOf(b.team), class: /red/i.test(String(b.card || b.type || '')) ? 'red' : 'yellow' }));
  (det?.substitutions || []).forEach(su => out.push({ type: 'substitution', minute: su.minute,
    team: sideOf(su.team), in: su.in || su.playerIn || su.on, out: su.out || su.playerOut || su.off }));
  return out;
}

function renderLive(d) {
  const el = $('#live');
  const tiles = matchDayTiles(d);
  if (!d.live?.length) {
    el.innerHTML = tiles;
    wireTiles();
    return;
  }
  el.innerHTML = d.live.map(m => {
    const s = SOFA[String(m.id)];
    const det = DETAILS[String(m.id)];
    const hasStats = o => o && Object.keys(o).length;
    // Merge Sofascore + ESPN stats (ESPN wins on overlap — it stays fresh even
    // when Sofascore rate-limits/403s us), so stats still show during a Sofa
    // outage instead of being stuck on a stale/empty Sofascore snapshot.
    const hStats = { ...(s?.stats?.home || {}), ...(det?.home?.stats || {}) };
    const aStats = { ...(s?.stats?.away || {}), ...(det?.away?.stats || {}) };
    const statHtml = (hasStats(hStats) || hasStats(aStats)) ? statBars(hStats, aStats) : '';
    const stageLabel = [m.stage, m.group].filter(Boolean).join(' · ');
    const goalsFor = code => {
      const gs = (det?.goals || []).filter(g => g.team === code);
      return gs.length ? `<span class="tmscorers">${gs.map(g =>
        `⚽ ${esc(g.scorer)} ${g.minute || ''}'${g.type === 'OWN' ? ' (og)' : g.type === 'PENALTY' ? ' (p)' : ''}`)
        .join('<br>')}</span>` : '';
    };
    const side = (t, away) => `<div class="t${away ? ' away' : ''}">
        <span class="flag">${t.flag}</span>
        <span><span class="nm">${esc(t.name)}</span><br>
        <span class="own">${esc(t.owner || '')}</span>
        ${goalsFor(t.code)}</span></div>`;
    const pitch = s?.pitch ? `<div class="pitchwrap">
        <img class="pitchimg" src="${RAW}${s.pitch}?t=${Date.now()}" alt="average player positions"></div>` : '';
    const shotmap = s?.shotmap_img ? `<div class="pitchwrap">
        <img class="pitchimg" src="${RAW}${s.shotmap_img}?t=${Date.now()}" alt="shot map"></div>` : '';
    const inc = incidentsFor(m, s, det);
    const lastInc = [...inc].sort((a, b) =>
      ((b.minute || 0) + (b.addedTime || 0) * 0.01) - ((a.minute || 0) + (a.addedTime || 0) * 0.01))
      .find(i => ['goal', 'card', 'substitution', 'period', 'varDecision'].includes(i.type));
    const lastEv = lastInc ? `<div class="lastev">${liveIncidents({ incidents: [lastInc] })}</div>` : '';
    return `<div class="livewrap">
      <span class="live-badge"><span class="dot"></span> LIVE</span>
      <div class="livecard">
        <div class="head" style="display:flex;justify-content:space-between;gap:10px;
          padding:10px 14px 0;color:var(--dim);font-size:.7rem;text-transform:uppercase;
          letter-spacing:1px"><span>${esc(stageLabel)}</span><span>${esc(m.venue || '')}</span></div>
        <div class="livegrid">
          <div class="left">
            ${duelStrip(m.home.owner, m.away.owner)}
            ${matchClock(m)}
            <div class="scoreline">
              ${side(m.home, false)}
              <div class="scorebox">${m.home.goals} – ${m.away.goals}</div>
              ${side(m.away, true)}
            </div>
            ${lastEv}
            ${oddsBar(m.odds, true)}
            ${lineupBlock(m.id, m.home, m.away)}
            ${pitch}
            ${shotmap}
            ${s?.momentum ? `<div style="padding:2px 16px 6px">${momentumChart(s, m.home.name, m.away.name, matchGoals(m, s, det))}</div>` : ''}
            ${statHtml ? `<div style="padding:2px 16px 10px">${statHtml}</div>` : ''}
          </div>
          <div class="right"><h4>Live events</h4><div class="feed">${liveIncidents({ incidents: inc })}</div></div>
        </div>
      </div></div>`;
  }).join('') + tiles;
  wireTiles();
}

function wireTiles() {
  document.querySelectorAll('.tile[data-go]').forEach(t => t.onclick = () => {
    document.querySelector(`nav button[data-tab="${t.dataset.go}"]`)?.click();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
}

/* ---------------- podium ---------------- */
function renderPodium(d) {
  const scored = d.players.filter(p => p.total > 0);
  if (!scored.length) {
    $('#podium').innerHTML = '<div class="empty">The podium appears once the first points are scored.</div>';
    return;
  }
  // up to three podium tiers by distinct points total; a shared total = joint place
  const totals = [...new Set(scored.map(p => p.total))].sort((a, b) => b - a).slice(0, 3);
  const TIERS = [['p1', '🥇', '1st'], ['p2', '🥈', '2nd'], ['p3', '🥉', '3rd']];
  const pods = totals.map((tot, i) => {
    const ps = scored.filter(p => p.total === tot);
    const [cls, medal, ord] = TIERS[i];
    const label = ps.length > 1 ? `Joint ${ord}` : ord;
    return `<div class="pod ${cls}">
      <div class="block"><span class="medal">${medal}</span><span>${label}</span></div>
      ${ps.map(p => `<div class="who">${esc(p.name)}</div>
        <div class="pts">${fmt(p.total)} pts</div>
        <div class="podteams">${p.teams.map(c =>
          `<span class="pt">${d.teams[c].flag} ${esc(d.teams[c].name)}</span>`).join('')}</div>`).join('')}
    </div>`;
  });
  $('#podium').innerHTML = `<div class="podium-stage">${pods.join('')}</div>
    <div class="podium-note">Current standings — updated automatically after every matchday.
    ${d.latest_day ? `Latest results: ${d.latest_day}.` : ''}</div>`;
}

/* ---------------- knockout bracket ---------------- */
const BRACKET_COLS = [
  ['LAST_32', 'Round of 32'], ['LAST_16', 'Round of 16'],
  ['QUARTER_FINALS', 'Quarter-finals'], ['SEMI_FINALS', 'Semi-finals'],
  ['FINAL', 'Final'],
];

function renderBracket(d) {
  if (!d.bracket?.length) {
    $('#bracket').innerHTML = '<div class="empty">The knockout bracket appears once the schedule loads.</div>';
    return;
  }
  const tieSide = (t, goals, isWin) => `<div class="row${isWin ? ' win' : ''}">
      <span class="tn ${t.code ? '' : 'tbd'}">${t.flag ? t.flag + ' ' : ''}${esc(t.name)}${
        t.owner ? ` <span class="owner">· ${esc(t.owner)}</span>` : ''}</span>
      <span class="sc">${goals ?? ''}</span></div>`;
  const cols = BRACKET_COLS.map(([stage, label]) => {
    const ties = d.bracket.filter(b => b.stage === stage);
    if (!ties.length) return '';
    const cards = ties.map(b => {
      const done = b.status === 'FINISHED';
      const when = done ? (b.note || 'FT')
        : new Date(b.utc).toLocaleString(undefined, { day: 'numeric', month: 'short',
            hour: '2-digit', minute: '2-digit' });
      return `<div class="btie${done ? ' done' : ''}">
        ${tieSide(b.home, b.hg, done && b.winner === b.home.code)}
        ${tieSide(b.away, b.ag, done && b.winner === b.away.code)}
        <div class="when">${esc(when)}${b.venue ? ' · ' + esc(b.venue) : ''}</div>
      </div>`;
    }).join('');
    return `<div class="bcol"><h4>${label}</h4>${cards}</div>`;
  }).join('');
  const champ = Object.values(d.teams).find(t => t.status === 'champion');
  $('#bracket').innerHTML = `${champ ? `<div class="banner" style="display:block">
      🏆 ${champ.flag} ${esc(champ.name)} are WORLD CHAMPIONS — ${esc(champ.owner || '')}</div>` : ''}
    <div class="bracket">${cols}</div>
    <p style="color:var(--dim);font-size:.75rem;text-align:center;margin-top:8px">
    The route to the final — winners move one column right. Scroll sideways on mobile.</p>`;
}

/* ---------------- match centre ---------------- */
const STAT_ROWS = [
  ['ball_possession', 'Possession %'], ['xg', 'Expected goals (xG)'],
  ['big_chances', 'Big chances'], ['shots', 'Shots'], ['shots_on_goal', 'On target'],
  ['shots_off_goal', 'Off target'], ['blocked_shots', 'Blocked shots'],
  ['woodwork', 'Hit woodwork'], ['corner_kicks', 'Corners'], ['free_kicks', 'Free kicks'],
  ['passes', 'Passes'], ['pass_accuracy', 'Pass accuracy %'],
  ['crosses', 'Crosses'], ['long_balls', 'Long balls'], ['tackles', 'Tackles'],
  ['interceptions', 'Interceptions'], ['clearances', 'Clearances'],
  ['throw_ins', 'Throw-ins'], ['fouls', 'Fouls'],
  ['offsides', 'Offsides'], ['saves', 'Saves'],
  ['yellow_cards', 'Yellow cards'], ['red_cards', 'Red cards'],
];

function statBars(h, a) {
  let html = '';
  for (const [key, label] of STAT_ROWS) {
    const hv = h?.[key], av = a?.[key];
    if (hv == null && av == null) continue;
    const H = hv || 0, A = av || 0, tot = H + A || 1;
    html += `<div class="stat">
      <div class="lbls"><span class="l">${H}</span><span class="c">${label}</span>
        <span class="r">${A}</span></div>
      <div class="bar2"><div class="bh" style="width:${(H / tot) * 100}%"></div>
        <div class="ba" style="width:${(A / tot) * 100}%"></div></div></div>`;
  }
  return html ? `<h4>Match stats</h4>${html}` : '';
}

function timeline(det, flagOf) {
  const evs = [];
  (det.goals || []).forEach(g => evs.push({
    min: g.minute || 0, inj: g.injury,
    html: `${flagOf(g.team)} ⚽ <b>${esc(g.scorer)}</b>` +
          (g.type === 'PENALTY' ? ' (pen)' : g.type === 'OWN' ? ' (og)' : '') +
          (g.assist ? ` <span class="who">assist: ${esc(g.assist)}</span>` : ''),
  }));
  (det.bookings || []).forEach(b => evs.push({
    min: b.minute || 0,
    html: `${flagOf(b.team)} ${b.card === 'RED' || b.card === 'YELLOW_RED' ? '🟥' : '🟨'} ${esc(b.player)}`,
  }));
  (det.substitutions || []).forEach(s => evs.push({
    min: s.minute || 0,
    html: `${flagOf(s.team)} 🔁 <span class="sub-in">${esc(s.in)}</span>
           <span class="who">for</span> <span class="sub-out">${esc(s.out)}</span>`,
  }));
  if (!evs.length) return '';
  evs.sort((x, y) => x.min - y.min);
  const rows = evs.map(e => `<div class="ev">
    <span class="min">${e.min}${e.inj ? '+' + e.inj : ''}'</span><span>${e.html}</span></div>`).join('');
  let pens = '';
  if ((det.penalties || []).length) {
    const list = det.penalties.map(p =>
      `${flagOf(p.team)} ${p.scored ? '✅' : '❌'} ${esc(p.player)}`).join(' · ');
    pens = `<h4>Penalty shootout</h4><div class="meta">${list}</div>`;
  }
  return `<h4>Timeline</h4><div class="tl">${rows}</div>${pens}`;
}

// cards shown right on the line-up so they're not buried in the timeline
const normName = s => String(s || '').toLowerCase().normalize('NFD')
  .replace(/[̀-ͯ]/g, '').replace(/[^a-z ]/g, '').trim();

function cardMap(id) {
  const m = {};
  const add = (player, isRed) => {
    if (!player) return;
    const k = normName(player);
    m[k] = (m[k] || '') + (isRed ? '🟥' : '🟨');
  };
  (DETAILS[String(id)]?.bookings || []).forEach(b =>
    add(b.player, b.card === 'RED' || b.card === 'YELLOW_RED'));
  if (!Object.keys(m).length) {
    (SOFA[String(id)]?.incidents || []).filter(i => i.type === 'card').forEach(i =>
      add(i.player, i.class === 'red' || i.class === 'yellowRed'));
  }
  return m;
}

function cardsFor(name, cmap) {
  const n = normName(name);
  if (cmap[n]) return cmap[n];
  const last = n.split(' ').pop();
  if (last.length > 3) {
    for (const k in cmap) if (k.split(' ').pop() === last) return cmap[k];
  }
  return '';
}

function lineupSide(side, team, cmap = {}) {
  if (!side?.lineup?.length) return '';
  const li = p => {
    const cards = cardsFor(p.name, cmap);
    return `<li><span class="no">${p.shirt ?? ''}</span> ${esc(p.name)}${cards ? ' ' + cards : ''}
      ${p.position ? `<span class="pos">${esc(p.position)}</span>` : ''}</li>`;
  };
  return `<div class="side">
    <h5>${team.flag} ${esc(team.name)}</h5>
    <div class="form">${side.formation ? esc(side.formation) : ''}
      ${side.coach ? ' · Coach: ' + esc(side.coach) : ''}</div>
    <ul>${side.lineup.map(li).join('')}</ul>
    ${side.bench?.length ? `<div class="bench-h">Bench</div>
      <ul>${side.bench.map(p => { const c = cardsFor(p.name, cmap);
        return `<li class="bench"><span class="no">${p.shirt ?? ''}</span>
        ${esc(p.name)}${c ? ' ' + c : ''}</li>`; }).join('')}</ul>` : ''}
  </div>`;
}

function recapText(r, det, d) {
  const hg = r.home.goals, ag = r.away.goals;
  const goals = (det?.goals || []).filter(g => g.minute != null).sort((a, b) => a.minute - b.minute);
  let winner = hg > ag ? r.home : ag > hg ? r.away : null;
  let loser = winner === r.home ? r.away : winner === r.away ? r.home : null;
  let pensBit = '';
  if (!winner && r.note && det?.penalties?.length) {
    const sc = {};
    det.penalties.forEach(p => { if (p.scored) sc[p.team] = (sc[p.team] || 0) + 1; });
    const hw = (sc[r.home.code] || 0) > (sc[r.away.code] || 0);
    winner = hw ? r.home : r.away;
    loser = hw ? r.away : r.home;
    pensBit = ` ${sc[winner.code] || 0}–${sc[loser.code] || 0} on penalties after a ${hg}–${ag} draw`;
  }
  const s = [];
  // sentence 1: the result
  let first;
  if (pensBit) first = `${winner.name} held their nerve to beat ${loser.name}${pensBit}`;
  else if (!winner) first = hg === 0 ? `${r.home.name} and ${r.away.name} played out a goalless draw`
    : `${r.home.name} and ${r.away.name} shared the points in a ${hg}–${ag} draw`;
  else {
    const ws = Math.max(hg, ag), ls = Math.min(hg, ag), diff = ws - ls;
    const verb = diff >= 4 ? 'demolished' : diff === 3 ? 'thrashed'
               : diff === 2 ? 'eased past' : ws + ls >= 3 ? 'edged' : 'beat';
    first = `${winner.name} ${verb} ${loser.name} ${ws}–${ls}`;
  }
  if (det?.venue) first += ` at ${det.venue}`;
  if (det?.attendance) first += ` in front of ${Number(det.attendance).toLocaleString()} fans`;
  s.push(first + '.');
  // sentence 2: an upset?
  const o = r.odds;
  if (winner && o) {
    const wOdds = winner === r.home ? o.home : o.away;
    if (wOdds >= 3) s.push(`A real upset — they had kicked off at ${toFrac(wOdds)} to win.`);
  }
  // sentence 3-4: the goals
  if (goals.length) {
    const g0 = goals[0];
    const scorerTeam = d.teams[g0.team]?.name || '';
    s.push(`${g0.scorer} opened the scoring for ${scorerTeam} on ${g0.minute}'` +
           (g0.type === 'PENALTY' ? ' from the spot' : g0.type === 'OWN' ? ' (an own goal)' : '') + '.');
    if (winner && goals.length > 1) {
      // did the winner trail at any point?
      let h = 0, a = 0, trailed = false;
      goals.forEach(g => {
        if (g.team === r.home.code) h++; else if (g.team === r.away.code) a++;
        const wAhead = winner === r.home ? h - a : a - h;
        if (wAhead < 0) trailed = true;
      });
      const last = goals[goals.length - 1];
      if (trailed) s.push(`${winner.name} came from behind, ${last.scorer} completing the turnaround on ${last.minute}'.`);
      else if (last.team === winner.code && Math.abs(hg - ag) === 1 && !pensBit)
        s.push(`${last.scorer} struck the decisive goal on ${last.minute}'.`);
    }
    const counts = {};
    goals.forEach(g => { if (g.type !== 'OWN') counts[g.scorer] = (counts[g.scorer] || 0) + 1; });
    const multi = Object.entries(counts).find(([, n]) => n >= 2);
    if (multi) s.push(`${multi[0]} finished with ${multi[1] === 2 ? 'a brace' : 'a hat-trick'}.`);
  }
  // sentence 5: red cards
  const reds = (det?.bookings || []).filter(b => b.card === 'RED' || b.card === 'YELLOW_RED');
  if (reds.length) s.push(reds.map(b =>
    `${b.player} (${d.teams[b.team]?.name || ''}) was sent off on ${b.minute}'`).join('; ') + '.');
  // sentence 6: possession flavour
  const hp = det?.home?.stats?.ball_possession, ap = det?.away?.stats?.ball_possession;
  if (hp != null && ap != null && Math.max(hp, ap) >= 62) {
    const dom = hp > ap ? r.home : r.away;
    s.push(`${dom.name} dominated the ball with ${Math.max(hp, ap)}% possession.`);
  }
  return s.join(' ');
}

// decimal -> traditional fractional odds (nearest bookmaker price: 2/5, 7/5, 4/1...)
const FRACS = ['1/20','1/10','1/8','1/6','1/5','2/9','1/4','2/7','3/10','1/3','4/11','2/5',
  '4/9','1/2','8/15','4/7','8/13','2/3','8/11','4/5','5/6','10/11','1/1','11/10','6/5','5/4',
  '11/8','7/5','3/2','13/8','7/4','15/8','2/1','9/4','5/2','11/4','3/1','10/3','7/2','4/1',
  '9/2','5/1','11/2','6/1','13/2','7/1','15/2','8/1','17/2','9/1','10/1','11/1','12/1','14/1',
  '16/1','18/1','20/1','25/1','33/1','40/1','50/1','66/1','100/1']
  .map(f => { const [n, d] = f.split('/').map(Number); return { f, v: n / d }; });

function toFrac(dec) {
  if (dec == null) return '–';
  const v = dec - 1;
  let best = FRACS[0];
  for (const c of FRACS) if (Math.abs(c.v - v) < Math.abs(best.v - v)) best = c;
  return best.f === '1/1' ? 'Evens' : best.f;
}

function oddsBar(o, closing) {
  if (!o) return '';
  return `<div class="oddsrow">
      <span class="odd"><b>Win</b><span class="val">${toFrac(o.home)}</span></span>
      <span class="odd"><b>Draw</b><span class="val">${toFrac(o.draw)}</span></span>
      <span class="odd"><b>Win</b><span class="val">${toFrac(o.away)}</span></span>
      <span class="oddmeta">${closing ? 'pre-match odds' : 'odds'}: ${esc(o.provider)}</span>
    </div>`;
}

function matchCentre(r, d) {
  const det = DETAILS[String(r.id)];
  if (!det) return '<div class="meta">Detailed match data not available yet — it appears a few hours after kick-off.</div>';
  const flagOf = code => d.teams[code]?.flag || '';
  const meta = [det.venue, det.attendance ? det.attendance.toLocaleString() + ' fans' : null,
                det.referee ? 'Referee: ' + det.referee : null].filter(Boolean).join(' · ');
  const sofa = SOFA[String(r.id)];
  const sides = (det.home?.lineup?.length || det.away?.lineup?.length)
    ? det : (sofa?.lineups?.home?.lineup?.length ? sofa.lineups : null);
  const cmap = cardMap(r.id);
  const lu = sides
    ? `<h4>Line-ups</h4><div class="lineups">
        ${lineupSide(sides.home, d.teams[r.home.code], cmap)}${lineupSide(sides.away, d.teams[r.away.code], cmap)}</div>`
    : '';
  const pitchImg = sofa?.pitch
    ? `<h4>Average positions</h4><img class="pitchimg" src="${RAW}${sofa.pitch}" alt="average positions">`
    : '';
  const shotImg = sofa?.shotmap_img
    ? `<h4>Shot map</h4><img class="pitchimg" src="${RAW}${sofa.shotmap_img}" alt="shot map">`
    : '';
  const recap = recapText(r, det, d);
  return `${recap ? `<h4>Match report</h4><div class="recap">${esc(recap)}</div>` : ''}
    ${meta ? `<div class="meta">${esc(meta)}</div>` : ''}
    ${momentumChart(sofa, r.home.name, r.away.name, matchGoals(r, sofa, det))}
    ${statBars({ ...(sofa?.stats?.home || {}), ...(det.home?.stats || {}) },
               { ...(sofa?.stats?.away || {}), ...(det.away?.stats || {}) })}
    ${shotImg}
    ${pitchImg}
    ${timeline(det, flagOf)}
    ${lu}`;
}

function scorerSummary(r) {
  const det = DETAILS[String(r.id)];
  if (!det?.goals?.length) return '';
  const bySide = side => det.goals.filter(g => g.team === side)
    .map(g => `${esc(g.scorer)} ${g.minute || '?'}'${g.type === 'PENALTY' ? ' (p)' : g.type === 'OWN' ? ' (og)' : ''}`)
    .join(', ');
  const h = bySide(r.home.code), a = bySide(r.away.code);
  if (!h && !a) return '';
  return `<div class="goalscorers"><div>${h ? '⚽ ' + h : ''}</div>
          <div class="away">${a ? a + ' ⚽' : ''}</div></div>`;
}

/* ---------------- matches tab ---------------- */
let fixtureFilter = 'all';

// Project final group tables assuming results follow the odds (or FIFA ranking
// where no odds are posted yet). Returns running standings + finishing positions.
function projectGroups(d) {
  const nameToCode = {};
  for (const c in d.teams) nameToCode[d.teams[c].name] = c;
  const st = {};                       // code -> running {pts, gd, gf, group}
  (d.groups || []).forEach(g => g.rows.forEach(r =>
    st[r.code] = { pts: r.pts, gd: r.gd, gf: r.gf, group: r.group || g.name }));
  (d.upcoming || []).forEach(u => {
    if (u.stage !== 'Group stage') return;
    const hc = nameToCode[u.home.name], ac = nameToCode[u.away.name];
    if (!hc || !ac || !st[hc] || !st[ac]) return;
    const o = u.odds || {};
    let win;
    if (o.home && o.draw && o.away) {
      win = (o.home <= o.draw && o.home <= o.away) ? 'home'
          : (o.away <= o.draw && o.away <= o.home) ? 'away' : 'draw';
    } else {                            // no odds yet -> better FIFA rank is favoured
      win = (d.teams[hc].fifa_rank || 999) <= (d.teams[ac].fifa_rank || 999) ? 'home' : 'away';
    }
    if (win === 'home') { st[hc].pts += 3; st[hc].gd += 1; st[hc].gf += 1; st[ac].gd -= 1; }
    else if (win === 'away') { st[ac].pts += 3; st[ac].gd += 1; st[ac].gf += 1; st[hc].gd -= 1; }
    else { st[hc].pts += 1; st[ac].pts += 1; }
  });
  const groups = {};
  for (const c in st) (groups[st[c].group] = groups[st[c].group] || []).push(c);
  const sp = d.scoring.group_position, byCode = {};
  for (const g in groups) {
    groups[g].sort((a, b) => st[b].pts - st[a].pts || st[b].gd - st[a].gd || st[b].gf - st[a].gf)
      .forEach((c, i) => { byCode[c] = { pos: i + 1, pts: sp[String(i + 1)] || 0, group: g }; });
  }
  return { byCode, st, groups };
}

// Walk the whole tournament: resolve qualifiers from the group projection, then
// play out the bracket (better FIFA rank advances) to a theoretical champion.
function projectTournament(d) {
  const G = projectGroups(d);
  const { st, groups } = G;
  const better = (a, b) => (d.teams[a]?.fifa_rank || 999) <= (d.teams[b]?.fifa_rank || 999) ? a : b;
  const letter = g => (g || '').replace('Group ', '').trim();

  const winnerOf = {}, secondOf = {}, thirds = [];
  for (const g in groups) {
    const L = letter(g);
    winnerOf[L] = groups[g][0];
    secondOf[L] = groups[g][1];
    if (groups[g][2]) thirds.push({ code: groups[g][2], L });
  }
  thirds.sort((a, b) => st[b.code].pts - st[a.code].pts || st[b.code].gd - st[a.code].gd
    || st[b.code].gf - st[a.code].gf);
  const thirdPool = thirds.slice(0, 8);        // 8 best third-placed teams advance

  const kw = d.scoring.knockout_win, koPts = {}, koRun = {};
  const award = (code, stage) => {
    koPts[code] = (koPts[code] || 0) + (kw[stage] || 0);
    (koRun[code] = koRun[code] || []).push(stage);
  };
  const STAGES = ['LAST_32', 'LAST_16', 'QUARTER_FINALS', 'SEMI_FINALS', 'FINAL'];
  const byStage = {};
  STAGES.forEach(s => byStage[s] = (d.bracket || []).filter(b => b.stage === s));
  const won = { LAST_32: [], LAST_16: [], QUARTER_FINALS: [], SEMI_FINALS: [] };

  const slot = name => {
    let m;
    if (m = name.match(/Group ([A-L]) Winner/)) return winnerOf[m[1]];
    if (m = name.match(/Group ([A-L]) 2nd Place/)) return secondOf[m[1]];
    if (m = name.match(/Third Place Group ([A-L/]+)/)) {
      const allowed = m[1].split('/');
      const i = thirdPool.findIndex(t => allowed.includes(t.L));
      const pick = i >= 0 ? thirdPool.splice(i, 1)[0] : thirdPool.shift();
      return pick ? pick.code : null;
    }
    if (m = name.match(/Round of 32 (\d+) Winner/)) return won.LAST_32[+m[1] - 1];
    if (m = name.match(/Round of 16 (\d+) Winner/)) return won.LAST_16[+m[1] - 1];
    if (m = name.match(/Quarterfinal (\d+) Winner/)) return won.QUARTER_FINALS[+m[1] - 1];
    if (m = name.match(/Semifinal (\d+) Winner/)) return won.SEMI_FINALS[+m[1] - 1];
    return null;
  };

  let champion = null, runnerUp = null;
  STAGES.forEach(stage => byStage[stage].forEach(b => {
    const h = slot(b.home.name), a = slot(b.away.name);
    const w = (h && a) ? better(h, a) : (h || a);
    if (w) award(w, stage);
    if (stage === 'FINAL') { champion = w; runnerUp = w === h ? a : h; }
    else won[stage].push(w);
  }));

  const playerTotals = {};
  d.players.forEach(p => playerTotals[p.name] = { group: 0, ko: 0, total: 0 });
  for (const c in d.teams) {
    const o = d.teams[c].owner; if (!o || !playerTotals[o]) continue;
    const gp = G.byCode[c] ? G.byCode[c].pts : 0, kp = koPts[c] || 0;
    playerTotals[o].group += gp; playerTotals[o].ko += kp; playerTotals[o].total += gp + kp;
  }
  return { G, koPts, koRun, champion, runnerUp, playerTotals };
}

function projectionPanel(d, player, T) {
  const ORD = ['1st', '2nd', '3rd', '4th'];
  const codes = Object.keys(d.teams).filter(c => d.teams[c].owner === player);
  const cur = (d.players.find(p => p.name === player) || {}).total || 0;
  const pt = T.playerTotals[player] || { group: 0, ko: 0, total: 0 };
  const rows = codes
    .sort((a, b) => (T.G.byCode[a]?.pos || 9) - (T.G.byCode[b]?.pos || 9))
    .map(c => {
      const t = d.teams[c], pr = T.G.byCode[c];
      const gp = pr ? pr.pts : 0, run = (T.koRun[c] || []).length;
      const finish = pr ? (ORD[pr.pos - 1] || pr.pos + 'th') : '—';
      const ko = run ? `wins ${run} KO tie${run > 1 ? 's' : ''} (+${T.koPts[c]})`
        : (pr && pr.pos <= 2 ? 'out in R32' : '—');
      return `<tr><td>${t.flag} ${esc(t.name)}</td>
        <td class="hide-sm">${esc(pr ? pr.group : '')}</td>
        <td>${finish}</td><td class="hide-sm">${ko}</td><td><b>${gp + (T.koPts[c] || 0)}</b></td></tr>`;
    }).join('');
  return `<div class="projcard">
    <div class="projhead">${esc(player)} — projected <b>${pt.total} pts</b> if results follow the odds</div>
    <div class="projsub">Group ${pt.group} + knockout ${pt.ko}. Currently on ${cur} pt${cur === 1 ? '' : 's'}.
      Odds where posted, otherwise FIFA ranking; recomputed as the tournament progresses.</div>
    <table class="projtbl">
      <thead><tr><th>Team</th><th class="hide-sm">Group</th><th>Finish</th><th class="hide-sm">Knockout</th><th>Pts</th></tr></thead>
      <tbody>${rows}</tbody></table>
  </div>`;
}

let projOpen = false;

function tournamentPanel(d, T) {
  const champ = T.champion ? d.teams[T.champion] : null;
  const ru = T.runnerUp ? d.teams[T.runnerUp] : null;
  const standings = d.players.map(p => ({ name: p.name, ...T.playerTotals[p.name] }))
    .sort((a, b) => b.total - a.total);
  const leader = standings[0];
  const rows = standings.map((s, i) => `<tr><td>${i + 1}</td><td>${esc(s.name)}</td>
    <td class="hide-sm">${s.group}</td><td class="hide-sm">${s.ko}</td><td><b>${s.total}</b></td></tr>`).join('');
  return `<details class="projtile"${projOpen ? ' open' : ''}>
    <summary>
      <span class="pt-ico">🔮</span>
      <span class="pt-main">Projected ${champ ? `${champ.flag} <b>${esc(champ.name)}</b> champions` : 'tournament'}${
        leader ? ` · 🏆 <b>${esc(leader.name)}</b> leads on ${leader.total}` : ''}</span>
      <span class="pt-cta">tap to drill in ▾</span>
    </summary>
    <div class="projbody">
      <div class="projsub">If every remaining game follows the bookies' odds (FIFA ranking where none posted).
        Knockout ties: better FIFA-ranked side advances. Full breakdown on the
        <a href="#" onclick="document.querySelector('nav button[data-tab=projection]').click();return false">Projection tab</a>.</div>
      ${champ ? `<div class="champ"><span class="cflag">${champ.flag}</span>
        <span>🏆 <b>${esc(champ.name)}</b> to lift the trophy${champ.owner ? ` — <span style="color:var(--gold)">${esc(champ.owner)}</span>'s pick` : ''}
        ${ru ? `<small>projected to beat ${ru.flag} ${esc(ru.name)} in the final</small>` : ''}</span></div>` : ''}
      <table class="projtbl">
        <thead><tr><th>#</th><th>Player</th><th class="hide-sm">Grp</th><th class="hide-sm">KO</th><th>Proj. total</th></tr></thead>
        <tbody>${rows}</tbody></table>
    </div>
  </details>`;
}

function renderProjection(d) {
  if (!d.players || !d.players.length) {
    $('#projection').innerHTML = '<div class="empty">Projection appears once the draw and fixtures load.</div>';
    return;
  }
  const T = projectTournament(d);
  const champ = T.champion ? d.teams[T.champion] : null;
  const ru = T.runnerUp ? d.teams[T.runnerUp] : null;
  const ABBR = { LAST_32: 'R32', LAST_16: 'R16', QUARTER_FINALS: 'QF', SEMI_FINALS: 'SF', FINAL: 'final' };
  const ORDER = ['LAST_32', 'LAST_16', 'QUARTER_FINALS', 'SEMI_FINALS', 'FINAL'];
  const deepest = name => {
    const codes = Object.keys(d.teams).filter(c => d.teams[c].owner === name);
    let best = null, bestRank = -1;
    codes.forEach(c => {
      const run = T.koRun[c] || [], last = run[run.length - 1], r = last ? ORDER.indexOf(last) : -1;
      if (r > bestRank) { bestRank = r; best = { code: c, stage: last }; }
    });
    if (!best || bestRank < 0) return '<span class="proj-deep">no team past the group stage</span>';
    const champ = best.code === T.champion;
    return `<span class="proj-deep">${d.teams[best.code].flag} ${esc(d.teams[best.code].name)} —
      ${champ ? '🏆 champions' : 'reach the ' + (ABBR[best.stage] || '')}</span>`;
  };
  const curRank = {};
  d.players.slice().sort((a, b) => (b.total || 0) - (a.total || 0)).forEach((p, i) => curRank[p.name] = i + 1);
  const standings = d.players.map(p => ({ name: p.name, cur: p.total || 0, ...T.playerTotals[p.name] }))
    .sort((a, b) => b.total - a.total || b.ko - a.ko);
  const rows = standings.map((s, i) => {
    const mv = curRank[s.name] - (i + 1);
    const move = mv > 0 ? `<span style="color:var(--accent)">▲${mv}</span>`
      : mv < 0 ? `<span style="color:#ff6b6b">▼${-mv}</span>` : '<span style="color:var(--dim)">–</span>';
    return `<tr><td>${i + 1}</td>
      <td><b>${esc(s.name)}</b><br>${deepest(s.name)}</td>
      <td class="hide-sm">${s.cur}</td><td class="hide-sm">${s.group}</td><td class="hide-sm">${s.ko}</td>
      <td><b>${s.total}</b></td><td>${move}</td></tr>`;
  }).join('');
  $('#projection').innerHTML = `
    <div class="proj-intro">How the table could finish if every remaining game goes the way of the
      bookmakers' odds — and FIFA ranking where no odds are posted yet. Knockout ties assume the
      higher‑ranked side advances. It recomputes automatically as real results land, so expect upsets
      to shake it up.</div>
    ${champ ? `<div class="champ"><span class="cflag">${champ.flag}</span>
      <span>🏆 <b>${esc(champ.name)}</b> projected champions${champ.owner ? ` — <span style="color:var(--gold)">${esc(champ.owner)}</span>'s pick` : ''}
      ${ru ? `<small>beating ${ru.flag} ${esc(ru.name)} in the final</small>` : ''}</span></div>` : ''}
    <table class="projtbl big">
      <thead><tr><th>#</th><th>Player · projected best run</th><th class="hide-sm">Now</th>
        <th class="hide-sm">Grp</th><th class="hide-sm">KO</th><th>Proj</th><th>±</th></tr></thead>
      <tbody>${rows}</tbody></table>`;
}

/* ---------------- news ---------------- */
function renderNews(d) {
  const today = d.latest_day || '';
  const rankOf = c => d.teams[c]?.fifa_rank || 99;
  const ownerOf = t => t.owner || d.teams[t.code]?.owner || '';
  const goalsHtml = id => {
    const inc = (typeof SOFA === 'object' && SOFA[id] && SOFA[id].incidents) || [];
    const g = inc.filter(i => i.type === 'goal');
    return g.length ? `<div class="ngoals">${g.map(x =>
      `<span>⚽ ${x.minute != null ? x.minute + "'" : ''} ${esc(x.player || '')}</span>`).join('')}</div>` : '';
  };
  const teamsHtml = m => {
    const h = m.home, a = m.away;
    const hs = h.goals != null ? h.goals : '', as = a.goals != null ? a.goals : '';
    const score = (hs !== '' || as !== '') ? `${hs}–${as}` : 'v';
    const ot = t => { const o = ownerOf(t); return o ? `<span class="ntag">${esc(o)}</span>` : ''; };
    return `<div class="nteams"><span class="nt">${h.flag} ${esc(h.name)} ${ot(h)}</span>
      <b class="nsc">${score}</b>
      <span class="nt away">${a.flag} ${esc(a.name)} ${ot(a)}</span></div>`;
  };
  const big = (hg, ag) => `${Math.max(hg, ag)}–${Math.min(hg, ag)}`;
  const matchStories = [], sweepStories = [];

  // LIVE — the most recent "game" of all (happening now)
  (d.live || []).forEach(m => {
    const h = m.home, a = m.away, hg = h.goals ?? 0, ag = a.goals ?? 0;
    let head = `${h.name} ${hg}–${ag} ${a.name}, live now`, bigFlag = false;
    if (Math.abs(hg - ag) >= 3) { head = `${(hg > ag ? h : a).name} running riot — ${big(hg, ag)} and counting`; bigFlag = true; }
    matchStories.push({ time: Date.now() + 1e9, icon: '🔴', live: true, big: bigFlag,
      kind: 'Live' + (m.minute != null ? ' ' + m.minute + "'" : ''),
      stage: [m.stage, m.group].filter(Boolean).join(' · '), head, teams: teamsHtml(m), goals: goalsHtml(m.id) });
  });

  // RESULTS — newest first; the sensational ones get starred (but not reordered)
  (d.results || []).forEach(r => {
    const h = r.home, a = r.away, hg = h.goals, ag = a.goals;
    if (hg == null || ag == null) return;
    const margin = Math.abs(hg - ag), tot = hg + ag;
    let icon = '⚽', head, bigFlag = false;
    const w = hg > ag ? h : ag > hg ? a : null, l = w ? (w === h ? a : h) : null;
    if (!w) { head = `${h.name} and ${a.name} share the spoils in a ${hg}–${ag} draw`; }
    else {
      const up = rankOf(w.code) - rankOf(l.code);                 // +ve = lower-ranked side won
      if (up >= 6) { icon = '🚨'; head = `Shock! ${w.name} stun ${l.name} ${big(hg, ag)}`; bigFlag = true; }
      else if (margin >= 3) { icon = '💥'; head = `${w.name} demolish ${l.name} ${big(hg, ag)}`; bigFlag = true; }
      else if (margin === 1) { head = `${w.name} edge ${l.name} ${big(hg, ag)}`; }
      else { head = `${w.name} see off ${l.name} ${big(hg, ag)}`; }
      if (rankOf(l.code) <= 8) { if (icon === '⚽') icon = '😱'; bigFlag = true; }   // a giant falls
    }
    if (tot >= 5) { if (icon === '⚽') icon = '🔥'; bigFlag = true; }                 // goal-fest
    const ow = w ? ownerOf(w) : '';
    matchStories.push({ time: Date.parse(r.utc) || 0, icon, big: bigFlag, kind: 'Full time',
      stage: [r.stage, r.group].filter(Boolean).join(' · ') + (ow ? ` · ${ow}'s pick` : ''),
      head, teams: teamsHtml(r), goals: goalsHtml(r.id) });
  });

  matchStories.sort((x, y) => y.time - x.time);   // most recent game always leads

  // SWEEPSTAKE updates — distinct bordered cards
  const board = d.players.slice().sort((x, y) => y.total - x.total);
  if (board[0] && board[0].total > 0) {
    const top = board[0], joint = board.filter(p => p.total === top.total);
    sweepStories.push({ icon: '👑', sweep: true, kind: 'Sweepstake', stage: 'Overall standings',
      head: joint.length > 1 ? `${joint.map(p => p.name).join(' & ')} share top spot on ${fmt(top.total)} pts`
        : `${top.name} leads the sweepstake on ${fmt(top.total)} pts` });
  }
  const mover = board.filter(p => p.movement > 0).sort((x, y) => y.movement - x.movement)[0];
  if (mover) sweepStories.push({ icon: '📈', sweep: true, kind: 'Sweepstake', stage: 'Biggest riser',
    head: `${mover.name} surges ${mover.movement} place${mover.movement > 1 ? 's' : ''} up the table` });

  if (!matchStories.length && !sweepStories.length) {
    $('#news').innerHTML = '<div class="empty">News will appear here as games kick off through the day.</div>';
    return;
  }
  // ---- shared helpers ----
  const tm = utc => { try { return new Date(utc).toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' }); } catch { return ''; } };
  const ago = iso => { try { const m = (Date.now() - Date.parse(iso)) / 60000;
    return m < 60 ? Math.round(m) + 'm ago' : m < 1440 ? Math.round(m / 60) + 'h ago' : Math.round(m / 1440) + 'd ago'; } catch { return ''; } };
  const mentioned = text => { for (const c in d.teams) { const t = d.teams[c];
    if (t.name && text.includes(t.name)) return t; } return null; };
  const newsCard = a => {
    const tm2 = mentioned((a.headline || '') + ' ' + (a.desc || ''));
    const tag = tm2 && tm2.owner ? `<span class="ntag">${tm2.flag} ${esc(tm2.owner)}'s pick</span>` : '';
    const href = a.link ? ` href="${esc(a.link)}" target="_blank" rel="noopener"` : '';
    return `<a class="newsitem"${href}>
      ${a.image ? `<img loading="lazy" src="${esc(a.image)}" alt="">` : ''}
      <div class="ni-body"><div class="ni-head">${esc(a.headline)}</div>
        ${a.desc ? `<div class="ni-desc">${esc(a.desc.slice(0, 140))}${a.desc.length > 140 ? '…' : ''}</div>` : ''}
        <div class="ni-meta"><span>${esc(a.source || 'BBC Sport')}${a.published ? ' · ' + ago(a.published) : ''}</span>${tag}</div></div></a>`;
  };
  const highlightCard = s => {
    const mod = s.live ? ' live' : s.sweep ? ' sweep' : s.big ? ' big' : ' result';
    const badge = s.sweep ? '<div class="nbadge bsweep">🏆 Sweepstake update</div>'
      : s.big ? '<div class="nbadge bbig">⭐ Big result</div>' : '';
    return `<div class="ncard${mod}">${badge}
      <div class="nhead"><span class="nkind">${s.icon} ${esc(s.kind)}</span><span class="nstage">${esc(s.stage)}</span></div>
      <div class="story-head">${s.big ? '⭐ ' : ''}${esc(s.head)}</div>
      ${s.teams || ''}${s.goals || ''}</div>`;
  };

  // today's fixtures → so previews of today's games can be surfaced first
  const todayTeams = new Set();
  (d.upcoming || []).forEach(u => { if ((u.utc || '').slice(0, 10) === today)
    [u.home, u.away].forEach(t => t.name && todayTeams.add(t.name)); });
  const newsList = (d.news || []).slice().sort((a, b) => {
    const rel = x => [...todayTeams].some(n => ((x.headline || '') + (x.desc || '')).includes(n)) ? 1 : 0;
    return rel(b) - rel(a);
  });

  // ---- interleaved feed: most recent game leads, ≤1 news story between highlights ----
  const highlights = [...matchStories.slice(0, 1), ...sweepStories, ...matchStories.slice(1)];
  let ni = 0;
  const feed = highlights.map(h => highlightCard(h)
    + (ni < newsList.length ? newsCard(newsList[ni++]) : '')).join('');

  // ---- on today: surface today's upcoming games prominently ----
  const soon = (d.upcoming || []).filter(u => (u.utc || '').slice(0, 10) === today)
    .sort((x, y) => (x.utc || '').localeCompare(y.utc || ''));
  const fav = u => { const o = u.odds || {}; if (!(o.home && o.away)) return '';
    return o.home < o.away ? `${u.home.flag} ${esc(u.home.name)} favoured`
      : o.away < o.home ? `${u.away.flag} ${esc(u.away.name)} favoured` : 'evenly matched'; };
  const soonHtml = soon.length ? `<h3 class="newsh">📅 On today — ${soon.length} still to come</h3>` + soon.map(u =>
    `<div class="ncard todaycard">
      <div class="nhead"><span class="nkind">⏱ ${tm(u.utc)} · today</span><span class="nstage">${esc([u.stage, u.group].filter(Boolean).join(' · '))}</span></div>
      <div class="nteams"><span class="nt">${u.home.flag} ${esc(u.home.name)} ${ownerOf(u.home) ? `<span class="ntag">${esc(ownerOf(u.home))}</span>` : ''}</span>
        <b class="nsc">v</b>
        <span class="nt away">${u.away.flag} ${esc(u.away.name)} ${ownerOf(u.away) ? `<span class="ntag">${esc(ownerOf(u.away))}</span>` : ''}</span></div>
      ${fav(u) ? `<div class="todayfav">📊 ${fav(u)}</div>` : ''}</div>`).join('') : '';

  // ---- full sequence of news stories at the bottom ----
  const newsHtml = newsList.length ? `<h3 class="newsh">🗞️ All team news &amp; previews</h3>` +
    newsList.map(newsCard).join('') : '';

  const scored = d.players.filter(p => p.total > 0);
  let podStrip = '';
  if (scored.length) {
    const totals = [...new Set(scored.map(p => p.total))].sort((a, b) => b - a).slice(0, 3);
    const MED = ['🥇', '🥈', '🥉'];
    const cells = totals.map((tot, i) => {
      const ps = scored.filter(p => p.total === tot);
      return `<div class="psc"><span class="pmed">${MED[i]}</span>
        <span class="pnm">${ps.map(p => esc(p.name)).join(' & ')}</span>
        <span class="ppt">${fmt(tot)} pts</span></div>`;
    }).join('');
    podStrip = `<div class="podstrip" role="button" tabindex="0"
      onclick="document.querySelector('nav button[data-tab=podium]').click()">
      <span class="pslabel">🏆 Podium</span>${cells}<span class="psmore">full table →</span></div>`;
  }
  $('#news').innerHTML = podStrip + soonHtml + feed + newsHtml;
}

const teamOwner = (d, t) => t.owner || d.teams[t.code]?.owner || '';
function fixtureFilterBar(d, id) {
  const F = fixtureFilter;
  return `<div class="fxctl"><label>Show for
    <select id="${id}">
      <option value="all"${F === 'all' ? ' selected' : ''}>Everyone</option>
      ${d.players.map(p => `<option value="${esc(p.name)}"${F === p.name ? ' selected' : ''}>${esc(p.name)}</option>`).join('')}
    </select></label></div>`;
}
function wireFixtureFilter(d, id) {
  const sel = document.getElementById(id);
  if (sel) sel.onchange = () => { fixtureFilter = sel.value; renderResults(d); renderFixtures(d); };
}

function renderResults(d) {
  const FILT = fixtureFilter;
  const inFilter = m => FILT === 'all' || teamOwner(d, m.home) === FILT || teamOwner(d, m.away) === FILT;
  const fResults = (d.results || []).filter(inFilter);
  const controls = fixtureFilterBar(d, 'rxfilter');
  let html = '';
  if (!fResults.length) {
    html = `<div class="empty">${(d.results || []).length
      ? 'No results for ' + esc(FILT) + ' yet.'
      : 'No results yet — the first match is on 11 June 2026.'}</div>`;
  } else {
    const side = (t, owner, away) => `<div class="t${away ? ' away' : ''}">
        <span class="flag">${t.flag}</span>
        <span><span class="nm">${esc(t.name)}</span>
        <span class="tier t${t.tier}">T${t.tier}</span><br>
        <span class="own">${esc(owner || '')}</span></span></div>`;
    const byDay = {};
    fResults.forEach(r => (byDay[r.date] = byDay[r.date] || []).push(r));
    for (const day of Object.keys(byDay).sort().reverse()) {
      const cards = byDay[day].map(r => {
        const stageLabel = [r.stage, r.group].filter(Boolean).join(' · ');
        return `<div class="match">
        <div class="head"><span>${esc(stageLabel)}</span><span></span></div>
        ${duelStrip(d.teams[r.home.code].owner, d.teams[r.away.code].owner)}
        <div class="scoreline">
          ${side(r.home, d.teams[r.home.code].owner, false)}
          <div class="scorebox">${r.home.goals} – ${r.away.goals}
            ${r.note ? `<small>${esc(r.note)}</small>` : ''}</div>
          ${side(r.away, d.teams[r.away.code].owner, true)}
        </div>
        ${scorerSummary(r)}
        ${oddsBar(r.odds, true)}
        ${r.home.points == null ? '' : `<div class="ptsrow">
          <span>${esc(d.teams[r.home.code].owner || '—')} <b>+${fmt(r.home.points)}</b></span>
          <span><b>+${fmt(r.away.points)}</b> ${esc(d.teams[r.away.code].owner || '—')}</span>
        </div>`}
        <button class="mc-btn" data-mid="${r.id}">Match centre ▾</button>
        <div class="mc" id="mc-${r.id}"></div>
      </div>`;
      }).join('');
      const date = new Date(day + 'T12:00:00Z').toLocaleDateString(undefined,
        { weekday: 'long', day: 'numeric', month: 'long' });
      html += `<div class="day"><h3>${date}</h3>${cards}</div>`;
    }
  }
  $('#results').innerHTML = controls + html;
  wireFixtureFilter(d, 'rxfilter');
  document.querySelectorAll('#results .mc-btn').forEach(btn => btn.onclick = () => {
    const panel = $('#mc-' + btn.dataset.mid);
    if (!panel.classList.contains('open') && !panel.innerHTML) {
      const r = d.results.find(x => String(x.id) === btn.dataset.mid);
      panel.innerHTML = matchCentre(r, d);
    }
    panel.classList.toggle('open');
    btn.textContent = panel.classList.contains('open') ? 'Match centre ▴' : 'Match centre ▾';
  });
}

function renderFixtures(d) {
  const FILT = fixtureFilter;
  const inFilter = m => FILT === 'all' || teamOwner(d, m.home) === FILT || teamOwner(d, m.away) === FILT;
  const fUpcoming = (d.upcoming || []).filter(inFilter);
  const controls = fixtureFilterBar(d, 'fxfilter');
  let html = '';
  if (!fUpcoming.length) {
    html = `<div class="empty">${(d.upcoming || []).length
      ? 'No upcoming fixtures for ' + esc(FILT) + '.' : 'No fixtures scheduled yet.'}</div>`;
  } else {
    const form = f => !f ? '' : `<span class="form">${[...f].slice(-5).map(c =>
      `<i class="${c}">${c}</i>`).join('')}</span>`;
    const upCard = u => {
      const when = new Date(u.utc).toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
      const stageLabel = [u.stage, u.group].filter(Boolean).join(' · ');
      return `<div class="match"><div class="head"><span>${esc(stageLabel)}</span>
        <span>⏱ ${when}</span></div>
        <div class="scoreline">
          <div class="t"><span class="flag">${u.home.flag}</span>
            <span><span class="nm">${esc(u.home.name)}</span>${form(u.home.form)}<br>
            <span class="own">${esc(u.home.owner || '')}</span></span></div>
          ${u.home.owner || u.away.owner
            ? `<div class="scorebox duel"><span>${esc(u.home.owner || '—')}</span>
               <small>versus</small><span>${esc(u.away.owner || '—')}</span></div>`
            : '<div class="scorebox">vs</div>'}
          <div class="t away"><span class="flag">${u.away.flag}</span>
            <span><span class="nm">${esc(u.away.name)}</span>${form(u.away.form)}<br>
            <span class="own">${esc(u.away.owner || '')}</span></span></div>
        </div>${oddsBar(u.odds, false)}${lineupBlock(u.id, u.home, u.away)}</div>`;
    };
    const upByDay = {};
    fUpcoming.forEach(u => { const k = u.utc.slice(0, 10); (upByDay[k] = upByDay[k] || []).push(u); });
    Object.keys(upByDay).sort().forEach((day, i) => {
      const date = new Date(day + 'T12:00:00Z').toLocaleDateString(undefined,
        { weekday: 'long', day: 'numeric', month: 'long' });
      const n = upByDay[day].length;
      html += `<div class="day"><h3>${i === 0 ? '📅 Next up · ' : '📅 '}${date}
          <span style="color:var(--dim);font-family:Archivo,sans-serif;font-size:.68rem;
            letter-spacing:1px">${n} match${n > 1 ? 'es' : ''}</span></h3>
        ${upByDay[day].map(upCard).join('')}</div>`;
    });
  }
  $('#fixtures').innerHTML = controls + html;
  wireFixtureFilter(d, 'fxfilter');
}

/* ---------------- groups ---------------- */
function renderGroups(d) {
  if (!d.groups?.length) {
    $('#groups').innerHTML = '<div class="empty">Group tables appear once the fixtures load.</div>';
    return;
  }
  const anyLive = d.groups.some(g => g.rows.some(r => r.live));
  const tables = d.groups.map(g => {
    const rows = g.rows.map((r, i) => `<tr class="${i < 2 ? 'q' : ''}${r.live ? ' liverow' : ''}">
      <td class="rank num">${i + 1}</td>
      <td class="teamcell">${r.flag} <b>${esc(r.name)}</b> ${r.live ? '<span class="livedot"></span>' : ''}<br>
        <span class="owner">${esc(r.owner || '')}</span></td>
      <td class="num">${r.p}</td>
      <td class="num hide-sm">${r.w}-${r.d}-${r.l}</td>
      <td class="num">${r.gd > 0 ? '+' : ''}${r.gd}</td>
      <td class="num total">${r.pts}</td></tr>`).join('');
    return `<div class="group"><div class="gname">${esc(g.name)}</div><table>
      <tr><th></th><th>Team</th><th class="num">P</th>
      <th class="num hide-sm">W-D-L</th><th class="num">GD</th><th class="num">Pts</th></tr>
      ${rows}</table></div>`;
  }).join('');
  $('#groups').innerHTML = `${anyLive ? `<p style="color:#ff7b7b;font-size:.78rem;
    text-align:center;margin-bottom:12px"><span class="livedot"></span>
    Tables are <b>as it stands</b> — matches in play count at the current score
    and finalise at full-time.</p>` : ''}
    <div class="groupgrid">${tables}</div>
    <p style="color:var(--dim);font-size:.75rem;margin-top:12px;text-align:center">
    Top two in each group qualify automatically; the eight best third-placed teams also advance.
    Group position = sweepstake points: 1st 5 · 2nd 3 · 3rd 1 · 4th 0.</p>`;
}

/* ---------------- teams ---------------- */
function renderTeams(d) {
  const teams = Object.values(d.teams).sort((a, b) => b.total - a.total || a.fifa_rank - b.fifa_rank);
  const rows = teams.map(t => {
    const evs = t.events.map(e =>
      `<div><span>${e.date} · ${esc(e.desc)}</span><span>+${fmt(e.points)}</span></div>`).join('')
      || '<div><span>No points yet</span><span></span></div>';
    const status = t.status === 'champion' ? ' 🏆' : t.status === 'out' ? ' ❌' : '';
    return `<details class="teamcard"><summary>
      <span>${t.flag} <b>${esc(t.name)}</b>${status}</span>
      <span class="tier t${t.tier}">T${t.tier}</span>
      <span class="owner">FIFA #${t.fifa_rank} · ${esc(t.owner || 'unassigned')}</span>
      <span class="grow"></span>
      <span class="owner">${t.won}W ${t.drawn}D ${t.lost}L</span>
      <span class="total">${fmt(t.total)}</span>
    </summary><div class="events">${evs}</div></details>`;
  }).join('');
  $('#teams').innerHTML = rows;
}

/* ---------------- golden boot ---------------- */
function renderScorers(d) {
  if (!d.scorers?.length) {
    $('#scorers').innerHTML = '<div class="empty">Top scorers appear once the goals start flying.</div>';
    return;
  }
  const rows = d.scorers.map((s, i) => `<tr class="${i === 0 ? 'top1' : ''}">
    <td class="rank num">${i === 0 ? '👑' : i + 1}</td>
    <td><b>${esc(s.player)}</b></td>
    <td>${s.flag} ${esc(d.teams[s.team]?.name || '')}</td>
    <td class="hide-sm owner">${esc(s.owner || '—')}</td>
    <td class="num total">${s.goals}</td>
    <td class="num">${s.assists ?? 0}</td></tr>`).join('');
  $('#scorers').innerHTML = `<table>
    <tr><th></th><th>Player</th><th>Team</th><th class="hide-sm">Sweepstake owner</th>
    <th class="num">⚽ Goals</th><th class="num">Assists</th></tr>${rows}</table>`;
}

/* ---------------- fair play ---------------- */
function renderFairplay(d) {
  if (!d.fairplay?.length) {
    $('#fairplay').innerHTML = '<div class="empty">All angels so far — cards land here as soon as they\'re shown.</div>';
    return;
  }
  const rows = d.fairplay.map((t, i) => `<tr class="${i === 0 ? 'top1' : ''}">
    <td class="rank num">${i === 0 ? '😈' : i + 1}</td>
    <td>${t.flag} <b>${esc(t.name)}</b></td>
    <td class="hide-sm owner">${esc(t.owner || '—')}</td>
    <td class="num">🟨 ${t.yellow}</td>
    <td class="num">🟥 ${t.red}</td>
    <td class="num total">${t.pts}</td></tr>`).join('');
  $('#fairplay').innerHTML = `<table>
    <tr><th></th><th>Team</th><th class="hide-sm">Owner</th><th class="num">Yellows</th>
    <th class="num">Reds</th><th class="num">Naughty pts</th></tr>${rows}</table>
    <p style="color:var(--dim);font-size:.75rem;margin-top:12px;text-align:center">
    Worst behaviour first — yellow 1 · second yellow 3 · straight red 4.
    Nothing to win here… except shame.</p>`;
}

/* ---------------- rules ---------------- */
function renderRules(d) {
  const s = d.scoring, gp = s.group_position, ko = s.knockout_win;
  const maxTotal = +gp["1"] + ko.LAST_32 + ko.LAST_16 + ko.QUARTER_FINALS + ko.SEMI_FINALS + ko.FINAL;
  $('#rules').innerHTML = `<div class="rules">
    <h3>The draw</h3>
    <p>48 teams ranked by FIFA world ranking, split into <b>four pots of 12</b>
    (Pot 1 = the top 12, Pot 2 = 13th–24th, Pot 3 = 25th–36th, Pot 4 = 37th–48th).
    Each of the <b>12 players</b> drew <b>one team from every pot</b> — four teams
    spanning a giant, a contender, a challenger and an underdog. That balance is
    the whole system: every point counts the same for everyone, no multipliers.</p>
    <h3>Group stage — finishing position</h3>
    <ul>
      <li>1st in the group: <b>${gp["1"]} pts</b></li>
      <li>2nd: <b>${gp["2"]} pts</b></li>
      <li>3rd: <b>${gp["3"]} pt</b></li>
      <li>4th: <b>${gp["4"]}</b></li>
    </ul>
    <p>The average team banks about 2.25 points here. Positions are scored
    <b>live</b> as group games finish — marked "(live)" on the Teams tab —
    and lock in once all six games in the group are played.</p>
    <h3>Knockout — points per tie won</h3>
    <ul>
      <li>Win your Round of 32 tie: <b>+${ko.LAST_32}</b></li>
      <li>Round of 16: <b>+${ko.LAST_16}</b> · Quarter-final: <b>+${ko.QUARTER_FINALS}</b>
          · Semi-final: <b>+${ko.SEMI_FINALS}</b></li>
      <li>Win the final: <b>+${ko.FINAL}</b></li>
    </ul>
    <p>Winning a penalty shootout counts as winning the tie. The third-place
    play-off carries no points.</p>
    <p style="margin-top:10px">A perfect run — top the group, then win every
    knockout game to the title — is worth <b>${maxTotal} points</b> from one team.
    Your four teams' totals add together.</p>
  </div>`;
}

/* ---------------- boot ---------------- */
let liveTimer = null, kickoffTimer = null, LAST_D = null;
// keep the countdown ticking without refetching
setInterval(() => { if (LAST_D && !LAST_D.live?.length) renderLive(LAST_D); }, 30000);
// always refetch on a baseline cadence so a page opened before kick-off still
// picks up a match the moment it starts (the 15s fast timer takes over once live)
setInterval(() => loadAll(true), 40000);

// Fetch live data straight from the raw git CDN (fresh on every commit) instead
// of GitHub Pages, whose build + 10-min CDN cache lags badly during live games.
// Falls back to the Pages-relative copy if raw is unreachable.
const RAW = 'https://raw.githubusercontent.com/spridge-bot/worldcup-sweepstake/live-data/docs/';
function grab(name, optional) {
  const bust = '?t=' + Date.now();
  const go = url => fetch(url, { cache: 'no-store' }).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });
  return go(RAW + name + bust).catch(() => go(name + bust)).catch(e => { if (optional) return {}; throw e; });
}

const SECTIONS = {
  leaderboard: renderLeaderboard, podium: renderPodium, projection: renderProjection,
  news: renderNews, results: renderResults, fixtures: renderFixtures, groups: renderGroups,
  bracket: renderBracket, teams: renderTeams, scorers: renderScorers,
  fairplay: renderFairplay, rules: renderRules,
};

// render one tab's section from the latest data (used when switching to it)
function renderSection(id) { if (LAST_D && SECTIONS[id]) SECTIONS[id](LAST_D); }

function loadAll(auto) {
  return Promise.all([
    grab('data.json'),
    grab('details.json', true),
    grab('sofascore.json', true),
  ]).then(([d, det, sofa]) => {
    DETAILS = det || {}; SOFA = sofa || {};
    const when = new Date(d.generated_at).toLocaleString();
    $('#updated').textContent = `Last updated ${when}` +
      (d.latest_day ? ` · latest results from ${d.latest_day}` : '');
    if (d.mode !== 'live') {
      $('#banner').style.display = 'block';
      $('#banner').textContent = d.mode === 'demo'
        ? '⚠️ DEMO DATA — these are fake results to preview the scoring.'
        : 'Waiting for the tournament to start — results will appear here automatically.';
    }
    renderLive(d);   // the always-visible live hero ticker — keeps them aware of the live game
    LAST_D = d;
    // On an auto-refresh, leave the tab the user is actively viewing untouched so we don't
    // collapse an open match centre or yank their scroll — they chose to look there.
    const active = document.querySelector('section.active')?.id;
    for (const [id, fn] of Object.entries(SECTIONS)) {
      if (auto && id === active) continue;
      fn(d);
    }
    if (d.live?.length && !liveTimer) liveTimer = setInterval(() => loadAll(true), 15000);
    if (!d.live?.length && liveTimer) { clearInterval(liveTimer); liveTimer = null; }
    // wake up at the next kick-off so the hero expands into the live view by itself
    clearTimeout(kickoffTimer);
    if (!d.live?.length) {
      const next = (d.upcoming || [])[0];
      if (next) {
        const ms = new Date(next.utc).getTime() - Date.now();
        kickoffTimer = setTimeout(() => loadAll(true), ms > 0 ? Math.min(ms + 45000, 3600e3) : 60000);
      }
    }
  });
}
loadAll().catch(() => { $('#updated').textContent = 'Could not load data.json — run scripts/update_scores.py first.'; });

// real-time live-score relay: the match watcher publishes every ~20s during
// games, so even the static public site updates near-instantly while a match
// is on — no waiting for the next git push.
try {
  new EventSource('https://ntfy.sh/wc26-sweepstake-live-spridge-k7q4x9/sse').onmessage = e => {
    try {
      const m = JSON.parse(e.data), p = JSON.parse(m.message);
      if (!LAST_D || (Date.now() / 1000 - (m.time || 0)) > 90) return;
      const cur = LAST_D.live = LAST_D.live || [];
      const i = cur.findIndex(x => x.id === p.id);
      if (p.ended) {
        if (i >= 0) { cur.splice(i, 1); loadAll(true).catch(() => {}); }
        return;
      }
      if (!p.live) return;
      if (i >= 0) cur[i] = p.live; else cur.unshift(p.live);
      const s = SOFA[String(p.id)] = SOFA[String(p.id)] || {};
      if (p.incidents) s.incidents = p.incidents;
      if (p.stats) s.stats = p.stats;
      LAST_D.generated_at = new Date((m.time || 0) * 1000).toISOString();
      renderLive(LAST_D);
    } catch {}
  };
} catch {}
</script>
</body>
</html>
