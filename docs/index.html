<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Sweepstake</title>
<style>
  :root {
    --bg0: #050d08; --bg1: #0a1f12; --card: #0e2417; --card2: #143020;
    --line: #1f4630; --line2: #2a5a3e;
    --text: #eef5ef; --dim: #8fb39d; --accent: #36d97c; --gold: #f5c542;
    --green: #4ade80; --red: #f87171; --white: #fff;
    --t1: #5ec8f8; --t2: #c5a3ff; --t3: #f5c542;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,.012) 0 90px, rgba(0,0,0,.05) 90px 180px),
      linear-gradient(180deg, var(--bg0) 0%, var(--bg1) 40%, #081a0e 100%);
    background-attachment: fixed;
    min-height: 100vh;
  }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 16px; }

  /* ---- header: stadium scoreboard ---- */
  header { text-align: center; padding: 30px 0 6px; position: relative; }
  header .kick { color: var(--accent); font-size: .72rem; font-weight: 700;
                 letter-spacing: 4px; text-transform: uppercase; }
  header h1 { font-size: clamp(1.6rem, 5vw, 2.4rem); font-weight: 900;
              letter-spacing: 1px; text-transform: uppercase; margin: 4px 0;
              text-shadow: 0 2px 12px rgba(54,217,124,.25); }
  header h1 .ball { font-size: .8em; }
  .pitchline { position: relative; height: 26px; margin: 10px auto 4px; max-width: 520px; }
  .pitchline::before { content: ""; position: absolute; left: 0; right: 0; top: 50%;
                       height: 2px; background: rgba(255,255,255,.14); }
  .pitchline::after { content: ""; position: absolute; left: 50%; top: 50%;
                      width: 26px; height: 26px; border: 2px solid rgba(255,255,255,.14);
                      border-radius: 50%; transform: translate(-50%, -50%);
                      background: var(--bg1); }
  header .sub { color: var(--dim); font-size: .82rem; margin-top: 8px; }
  .banner { background: rgba(245,197,66,.08); border: 1px solid rgba(245,197,66,.4);
            border-radius: 10px; padding: 10px 14px; margin: 14px 0; font-size: .85rem;
            color: var(--gold); text-align: center; display: none; }

  /* ---- nav ---- */
  nav { display: flex; gap: 6px; justify-content: center; margin: 18px 0 22px;
        flex-wrap: wrap; }
  nav button { background: var(--card); color: var(--dim); border: 1px solid var(--line);
               border-radius: 999px; padding: 8px 16px; font-size: .85rem; cursor: pointer;
               font-weight: 600; transition: all .15s; }
  nav button:hover { border-color: var(--accent); color: var(--text); }
  nav button.active { background: var(--accent); color: #04150b; border-color: var(--accent); }
  nav a.navlink { background: var(--card); color: var(--gold); border: 1px solid var(--line);
                  border-radius: 999px; padding: 8px 16px; font-size: .85rem;
                  font-weight: 600; text-decoration: none; }
  nav a.navlink:hover { border-color: var(--gold); }
  section { display: none; } section.active { display: block; }

  /* ---- tables ---- */
  table { width: 100%; border-collapse: collapse; background: var(--card);
          border-radius: 14px; overflow: hidden; border: 1px solid var(--line); }
  th, td { padding: 10px 12px; text-align: left; font-size: .9rem; }
  th { background: var(--card2); color: var(--dim); font-size: .72rem;
       text-transform: uppercase; letter-spacing: 1px; }
  tr:not(:last-child) td { border-bottom: 1px solid var(--line); }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .total { font-weight: 800; color: var(--gold); }
  .rank { color: var(--dim); width: 2.4em; font-weight: 700; }
  .top1 td { background: rgba(245,197,66,.07); }
  .mv-up { color: var(--green); font-size: .8rem; }
  .mv-down { color: var(--red); font-size: .8rem; }
  .mv-flat { color: var(--dim); font-size: .8rem; }
  .today-pos { color: var(--green); font-weight: 700; }

  .chip { display: inline-flex; align-items: center; gap: 4px; background: var(--card2);
          border: 1px solid var(--line2); border-radius: 999px; padding: 2px 9px;
          font-size: .8rem; margin: 2px 3px 2px 0; white-space: nowrap; }
  .chip.out { opacity: .4; text-decoration: line-through; }
  .chip.champion { border-color: var(--gold); color: var(--gold); }
  .tier { font-size: .62rem; font-weight: 800; border-radius: 4px; padding: 1px 4px; }
  .tier.t1 { background: var(--t1); color: #04150b; }
  .tier.t2 { background: var(--t2); color: #04150b; }
  .tier.t3 { background: var(--t3); color: #04150b; }

  /* ---- match cards ---- */
  .day { margin-bottom: 26px; }
  .day h3 { color: var(--accent); font-size: .78rem; text-transform: uppercase;
            letter-spacing: 2px; margin-bottom: 10px; display: flex; align-items: center;
            gap: 10px; }
  .day h3::after { content: ""; flex: 1; height: 1px; background: var(--line); }
  .match { background: linear-gradient(180deg, var(--card2), var(--card));
           border: 1px solid var(--line); border-radius: 14px; margin-bottom: 12px;
           overflow: hidden; }
  .match .head { display: flex; justify-content: space-between; padding: 9px 14px 0;
                 color: var(--dim); font-size: .7rem; text-transform: uppercase;
                 letter-spacing: 1px; }
  .scoreline { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px;
               align-items: center; padding: 10px 14px 4px; }
  .scoreline .t { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .scoreline .t.away { flex-direction: row-reverse; text-align: right; }
  .scoreline .t .flag { font-size: 1.7rem; line-height: 1; }
  .scoreline .t .nm { font-weight: 800; font-size: .98rem; }
  .scoreline .t .own { color: var(--dim); font-size: .72rem; }
  .scorebox { background: #04150b; border: 1px solid var(--line2); border-radius: 10px;
              padding: 6px 14px; font-size: 1.5rem; font-weight: 900;
              font-variant-numeric: tabular-nums; white-space: nowrap;
              box-shadow: inset 0 2px 8px rgba(0,0,0,.5); }
  .scorebox small { font-size: .65rem; color: var(--dim); display: block;
                    text-align: center; font-weight: 600; }
  .goalscorers { display: flex; justify-content: space-between; gap: 12px;
                 padding: 2px 16px 8px; color: var(--dim); font-size: .76rem; }
  .goalscorers div { max-width: 48%; }
  .goalscorers div.away { text-align: right; margin-left: auto; }
  /* odds + form */
  .oddsrow { display: flex; justify-content: center; align-items: center; gap: 8px;
             padding: 8px 14px 10px; flex-wrap: wrap; }
  .odd { background: #04150b; border: 1px solid var(--line2); border-radius: 8px;
         padding: 4px 10px; font-size: .8rem; font-variant-numeric: tabular-nums; }
  .odd b { color: var(--accent); margin-right: 5px; font-size: .7rem; }
  .odd .val { font-weight: 700; }
  .oddmeta { color: var(--dim); font-size: .68rem; }
  .form { display: inline-flex; gap: 2px; margin-left: 6px; vertical-align: middle; }
  .form i { font-style: normal; font-size: .58rem; font-weight: 800; width: 13px;
            height: 13px; line-height: 13px; text-align: center; border-radius: 3px;
            color: #04150b; }
  .form .W { background: var(--green); }
  .form .D { background: #9ca3af; }
  .form .L { background: var(--red); }
  .ptsrow { display: flex; justify-content: space-between; padding: 8px 14px;
            border-top: 1px dashed var(--line); font-size: .8rem; color: var(--dim); }
  .ptsrow b { color: var(--green); }
  .mc-btn { width: 100%; background: rgba(54,217,124,.06); color: var(--accent);
            border: none; border-top: 1px solid var(--line); padding: 8px;
            font-size: .75rem; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase; cursor: pointer; }
  .mc-btn:hover { background: rgba(54,217,124,.12); }
  .mc { display: none; padding: 14px 16px 18px; border-top: 1px solid var(--line);
        background: rgba(0,0,0,.18); }
  .mc.open { display: block; }
  .mc h4 { color: var(--accent); font-size: .72rem; text-transform: uppercase;
           letter-spacing: 2px; margin: 16px 0 10px; text-align: center; }
  .mc h4:first-child { margin-top: 0; }
  .mc .meta { text-align: center; color: var(--dim); font-size: .76rem; margin-bottom: 4px; }

  /* stats bars */
  .stat { margin-bottom: 9px; }
  .stat .lbls { display: flex; justify-content: space-between; font-size: .78rem;
                margin-bottom: 3px; }
  .stat .lbls .l { font-weight: 700; min-width: 3em; }
  .stat .lbls .r { font-weight: 700; min-width: 3em; text-align: right; }
  .stat .lbls .c { color: var(--dim); font-size: .72rem; text-transform: uppercase;
                   letter-spacing: 1px; }
  .stat .bars { display: flex; gap: 3px; height: 6px; }
  .stat .bars .h { background: var(--accent); border-radius: 3px 0 0 3px;
                   margin-left: auto; }
  .stat .bars .a { background: var(--gold); border-radius: 0 3px 3px 0; }
  .stat .half { flex: 1; display: flex; }
  .stat .half.right .a { margin-right: auto; }

  /* timeline */
  .tl { max-width: 560px; margin: 0 auto; }
  .tl .ev { display: flex; gap: 10px; align-items: baseline; padding: 4px 0;
            font-size: .84rem; border-bottom: 1px dashed rgba(255,255,255,.05); }
  .tl .ev .min { color: var(--accent); font-weight: 800; min-width: 3.2em;
                 text-align: right; font-variant-numeric: tabular-nums; }
  .tl .ev .who { color: var(--dim); font-size: .76rem; }
  .tl .ev .sub-in { color: var(--green); } .tl .ev .sub-out { color: var(--red); }

  /* lineups */
  .lineups { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .lineups .side h5 { font-size: .85rem; margin-bottom: 2px; }
  .lineups .side .form { color: var(--dim); font-size: .74rem; margin-bottom: 8px; }
  .lineups .side ul { list-style: none; }
  .lineups .side li { font-size: .8rem; padding: 2.5px 0; color: var(--text); }
  .lineups .side li .no { display: inline-block; min-width: 1.9em; color: var(--accent);
                          font-weight: 700; font-variant-numeric: tabular-nums; }
  .lineups .side li .pos { color: var(--dim); font-size: .7rem; }
  .lineups .side .bench-h { margin-top: 10px; color: var(--dim); font-size: .7rem;
                            text-transform: uppercase; letter-spacing: 1px; }
  .lineups .side li.bench { color: var(--dim); }

  /* groups */
  .groupgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
               gap: 14px; }
  .group table { font-size: .82rem; }
  .group th, .group td { padding: 7px 8px; font-size: .8rem; }
  .group .gname { background: var(--card2); color: var(--gold); font-weight: 800;
                  letter-spacing: 1px; text-transform: uppercase; font-size: .74rem;
                  padding: 8px 10px; }
  .group .q td { border-left: 3px solid var(--accent); }
  .group td.teamcell { white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
                       max-width: 130px; }

  details.teamcard { background: var(--card); border: 1px solid var(--line);
                     border-radius: 12px; margin-bottom: 8px; }
  summary { padding: 10px 14px; cursor: pointer; display: flex; align-items: center;
            gap: 8px; flex-wrap: wrap; }
  summary .grow { flex: 1; }
  .owner { color: var(--dim); font-size: .75rem; }
  .events { padding: 0 14px 12px; }
  .events div { display: flex; justify-content: space-between; font-size: .82rem;
                color: var(--dim); padding: 3px 0; border-top: 1px dashed var(--line); }

  /* live hero */
  .livewrap { margin: 14px 0 4px; }
  .live-badge { display: inline-flex; align-items: center; gap: 7px; background: #2a0a0a;
                color: #ff7b7b; border: 1px solid #7a2727; border-radius: 999px;
                padding: 3px 13px; font-size: .7rem; font-weight: 800; letter-spacing: 2px; }
  .live-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: #ff4444;
                     animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .2; } }
  .livecard { background: linear-gradient(135deg, #143424, #0e2417 65%);
              border: 1px solid var(--line2); border-radius: 16px; margin-top: 10px;
              overflow: hidden; box-shadow: 0 0 36px rgba(54,217,124,.12); }
  .livecard .clock { color: var(--accent); font-weight: 800; font-variant-numeric: tabular-nums; }
  .livegrid { display: grid; grid-template-columns: 1.05fr .95fr; gap: 0; }
  .livegrid .left { padding: 4px 0 10px; }
  .livegrid .right { border-left: 1px solid var(--line); padding: 12px 14px;
                     max-height: 460px; overflow-y: auto; }
  .livegrid .right h4 { color: var(--accent); font-size: .7rem; text-transform: uppercase;
                        letter-spacing: 2px; margin-bottom: 8px; }
  .feed .inc { display: flex; gap: 9px; padding: 5px 0; font-size: .82rem; align-items: baseline;
               border-bottom: 1px dashed rgba(255,255,255,.06); }
  .feed .inc .min { color: var(--accent); font-weight: 800; min-width: 2.9em; text-align: right;
                    font-variant-numeric: tabular-nums; }
  .feed .inc.big { background: rgba(54,217,124,.07); border-radius: 6px; padding: 6px 6px; }
  .feed .inc .who { color: var(--dim); font-size: .74rem; }
  .pitchimg { width: 100%; display: block; border-radius: 10px; margin-top: 10px; }
  .pitchwrap { padding: 0 14px 12px; }
  @media (max-width: 720px) { .livegrid { grid-template-columns: 1fr; }
    .livegrid .right { border-left: none; border-top: 1px solid var(--line); } }

  /* podium */
  .podium-stage { display: flex; align-items: flex-end; justify-content: center; gap: 14px;
                  margin: 34px 0 8px; }
  .pod { text-align: center; flex: 1; max-width: 230px; }
  .pod .medal { font-size: 2.3rem; }
  .pod .who { font-weight: 900; font-size: 1.08rem; margin: 2px 0; }
  .pod .pts { color: var(--gold); font-weight: 800; margin-bottom: 4px; }
  .pod .flags { font-size: 1.25rem; margin-bottom: 10px; letter-spacing: 2px; }
  .pod .block { border-radius: 12px 12px 0 0; display: flex; align-items: center;
                justify-content: center; font-size: 2.1rem; font-weight: 900; color: #04150b;
                box-shadow: 0 -6px 24px rgba(0,0,0,.35) inset; }
  .pod.p1 .block { height: 150px; background: linear-gradient(180deg, #f7cf5a, #b8902a); }
  .pod.p2 .block { height: 110px; background: linear-gradient(180deg, #dde4e8, #97a2a9); }
  .pod.p3 .block { height: 84px;  background: linear-gradient(180deg, #e2a65f, #a96f33); }
  .podium-note { text-align: center; color: var(--dim); font-size: .78rem; margin-top: 14px; }

  /* knockout bracket */
  .bracket { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 12px;
             -webkit-overflow-scrolling: touch; }
  .bcol { min-width: 218px; display: flex; flex-direction: column;
          justify-content: space-around; gap: 10px; }
  .bcol h4 { color: var(--accent); text-transform: uppercase; font-size: .7rem;
             letter-spacing: 1.5px; text-align: center; }
  .btie { background: var(--card); border: 1px solid var(--line); border-radius: 10px;
          padding: 8px 10px; font-size: .8rem; }
  .btie.done { background: linear-gradient(180deg, var(--card2), var(--card)); }
  .btie .row { display: flex; justify-content: space-between; gap: 6px; padding: 2px 0; }
  .btie .row .tn { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .btie .row.win .tn { font-weight: 800; color: var(--accent); }
  .btie .row .sc { font-weight: 800; font-variant-numeric: tabular-nums; }
  .btie .tbd { color: var(--dim); font-style: italic; }
  .btie .when { color: var(--dim); font-size: .66rem; margin-top: 4px; }

  /* confirmed line-ups toggle */
  details.lu { border-top: 1px dashed var(--line); }
  details.lu summary { color: var(--accent); font-size: .75rem; font-weight: 700;
                       letter-spacing: 1px; text-transform: uppercase; padding: 9px 14px;
                       cursor: pointer; text-align: center; list-style-position: inside; }
  details.lu .lineups { padding: 4px 16px 14px; }

  /* match report */
  .recap { background: rgba(54,217,124,.05); border-left: 3px solid var(--accent);
           border-radius: 0 8px 8px 0; padding: 10px 14px; font-size: .86rem;
           line-height: 1.55; margin-bottom: 6px; }

  .rules { background: var(--card); border: 1px solid var(--line); border-radius: 14px;
           padding: 20px 22px; line-height: 1.65; font-size: .92rem; }
  .rules h3 { margin: 16px 0 6px; color: var(--accent); font-size: 1rem;
              text-transform: uppercase; letter-spacing: 1px; }
  .rules h3:first-child { margin-top: 0; }
  .rules li { margin-left: 20px; }
  .empty { text-align: center; color: var(--dim); padding: 50px 0; }
  footer { text-align: center; color: var(--dim); font-size: .72rem; padding: 28px 0;
           letter-spacing: 1px; }
  @media (max-width: 620px) {
    th, td { padding: 8px 6px; font-size: .78rem; }
    .hide-sm { display: none; }
    .lineups { grid-template-columns: 1fr; }
    .scoreline .t .flag { font-size: 1.3rem; }
    .scorebox { font-size: 1.15rem; padding: 5px 10px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kick">United 2026 · USA · Canada · Mexico</div>
    <h1><span class="ball">⚽</span> World Cup Sweepstake</h1>
    <div class="pitchline"></div>
    <div class="sub" id="updated">Loading…</div>
  </header>
  <div class="banner" id="banner"></div>
  <div id="live"></div>

  <nav>
    <button data-tab="leaderboard" class="active">Leaderboard</button>
    <button data-tab="podium">Podium</button>
    <button data-tab="results">Matches</button>
    <button data-tab="groups">Groups</button>
    <button data-tab="bracket">Bracket</button>
    <button data-tab="teams">Teams</button>
    <button data-tab="scorers">Golden Boot</button>
    <button data-tab="rules">Rules</button>
    <a class="navlink" href="draw.html">🎡 Draw Night</a>
  </nav>

  <section id="leaderboard" class="active"></section>
  <section id="podium"></section>
  <section id="results"></section>
  <section id="groups"></section>
  <section id="bracket"></section>
  <section id="teams"></section>
  <section id="scorers"></section>
  <section id="rules"></section>

  <footer>SCORES UPDATE AUTOMATICALLY · GROUP POSITION 5·3·1·0 · KNOCKOUT WINS 2·3·4·5·6</footer>
</div>

<script>
const $ = sel => document.querySelector(sel);
let DETAILS = {}, SOFA = {};

document.querySelectorAll('nav button').forEach(b => b.onclick = () => {
  document.querySelectorAll('nav button').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('section').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  $('#' + b.dataset.tab).classList.add('active');
});

const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt = n => (n % 1 === 0 ? n.toFixed(0) : n.toFixed(1));
const MEDALS = {1: '🥇', 2: '🥈', 3: '🥉'};

function chip(team) {
  const cls = team.status === 'out' ? ' out' : team.status === 'champion' ? ' champion' : '';
  return `<span class="chip${cls}">${team.flag} ${esc(team.name)}
          <span class="tier t${team.tier}">T${team.tier}</span></span>`;
}

function movement(mv) {
  if (mv > 0) return `<span class="mv-up">▲${mv}</span>`;
  if (mv < 0) return `<span class="mv-down">▼${-mv}</span>`;
  return `<span class="mv-flat">–</span>`;
}

/* ---------------- leaderboard ---------------- */
function renderLeaderboard(d) {
  const rows = d.players.map(p => {
    const teams = p.teams.map(c => chip(d.teams[c])).join(' ');
    const today = p.today > 0 ? `<span class="today-pos">+${fmt(p.today)}</span>`
                : p.today < 0 ? fmt(p.today) : '<span class="mv-flat">–</span>';
    const medal = p.total > 0 && MEDALS[p.rank] ? MEDALS[p.rank] + ' ' : '';
    return `<tr class="${p.rank === 1 && p.total > 0 ? 'top1' : ''}">
      <td class="rank num">${medal || p.rank}</td>
      <td>${movement(p.movement)}</td>
      <td><b>${esc(p.name)}</b></td>
      <td>${teams}</td>
      <td class="num">${today}</td>
      <td class="num total">${fmt(p.total)}</td></tr>`;
  }).join('');
  $('#leaderboard').innerHTML = `<table>
    <tr><th>#</th><th></th><th>Player</th><th>Teams</th>
    <th class="num">Latest</th><th class="num">Total</th></tr>${rows}</table>`;
}

/* ---------------- live hero ---------------- */
function liveIncidents(s) {
  if (!s?.incidents?.length) return '<div class="inc"><span class="min"></span><span class="who">Waiting for the first events…</span></div>';
  return [...s.incidents].reverse().map(i => {
    const min = i.minute != null ? `${i.minute}${i.addedTime ? '+' + i.addedTime : ''}'` : '';
    let icon = '·', txt = esc(i.text || i.class || i.type || ''), big = false;
    if (i.type === 'goal') {
      big = true; icon = '⚽';
      txt = `<b>GOAL!</b> ${esc(i.player || '')}` +
        (i.class === 'penalty' ? ' (pen)' : i.class === 'ownGoal' ? ' (og)' : '') +
        (i.assist ? ` <span class="who">assist: ${esc(i.assist)}</span>` : '') +
        (i.homeScore != null ? ` <b>${i.homeScore}–${i.awayScore}</b>` : '');
    } else if (i.type === 'card') {
      icon = (i.class === 'red' || i.class === 'yellowRed') ? '🟥' : '🟨';
      txt = esc(i.player || '');
    } else if (i.type === 'substitution') {
      icon = '🔁';
      txt = `<span style="color:var(--green)">${esc(i.in || '')}</span>
        <span class="who">for</span> <span style="color:var(--red)">${esc(i.out || '')}</span>`;
    } else if (i.type === 'period') { icon = '⏱'; big = true; txt = `<b>${esc(i.text || '')}</b>`;
    } else if (i.type === 'injuryTime') { icon = '⏱'; txt = `+${i.length ?? ''} min added`;
    } else if (i.type === 'varDecision') { icon = '📺'; txt = `VAR: ${esc(i.text || i.class || '')}`; }
    return `<div class="inc${big ? ' big' : ''}"><span class="min">${min}</span><span>${icon} ${txt}</span></div>`;
  }).join('');
}

function lineupBlock(id, home, away, label) {

function renderPodium(d) {
  const scored = d.players.filter(p => p.total > 0);
  if (!scored.length) {
    $('#podium').innerHTML = '<div class="empty">The podium appears once the first points are scored.</div>';

const BRACKET_COLS = [
  ['LAST_32', 'Round of 32'], ['LAST_16', 'Round of 16'],
  ['QUARTER_FINALS', 'Quarter-finals'], ['SEMI_FINALS', 'Semi-finals'],
  ['FINAL', 'Final'],
];

function renderBracket(d) {
  if (!d.bracket?.length) {
    $('#bracket').innerHTML = '<div class="empty">The knockout bracket appears once the schedule loads.</div>';
    return;
  }
  const tieSide = (t, goals, isWin) => `<div class="row${isWin ? ' win' : ''}">
      <span class="tn ${t.code ? '' : 'tbd'}">${t.flag ? t.flag + ' ' : ''}${esc(t.name)}${
        t.owner ? ` <span class="owner">· ${esc(t.owner)}</span>` : ''}</span>
      <span class="sc">${goals ?? ''}</span></div>`;
  const cols = BRACKET_COLS.map(([stage, label]) => {

    const cards = ties.map(b => {
      const done = b.status === 'FINISHED';
      const when = done ? (b.note || 'FT')
        : new Date(b.utc).toLocaleString(undefined, { day: 'numeric', month: 'short',
            hour: '2-digit', minute: '2-digit' });
      return `<div class="btie${done ? ' done' : ''}">

/* ---------------- match centre ---------------- */
const STAT_ROWS = [
  ['ball_possession', 'Possession %'], ['shots', 'Shots'], ['shots_on_goal', 'On target'],
  ['corner_kicks', 'Corners'], ['passes', 'Passes'], ['pass_accuracy', 'Pass accuracy %'],
  ['crosses', 'Crosses'], ['long_balls', 'Long balls'], ['fouls', 'Fouls'],
  ['offsides', 'Offsides'], ['saves', 'Saves'],
  ['yellow_cards', 'Yellow cards'], ['red_cards', 'Red cards'],
];

function statBars(h, a) {
  let html = '';
  for (const [key, label] of STAT_ROWS) {
    const hv = h?.[key], av = a?.[key];
    if (hv == null && av == null) continue;
    const H = hv || 0, A = av || 0, tot = H + A || 1;
    html += `<div class="stat">
      <div class="lbls"><span class="l">${H}</span><span class="c">${label}</span>
        <span class="r">${A}</span></div>
      <div class="bars">
        <div class="half"><div class="h" style="width:${(H / tot) * 100}%"></div></div>
        <div class="half right"><div class="a" style="width:${(A / tot) * 100}%"></div></div>
      </div></div>`;
  }
  return html ? `<h4>Match stats</h4>${html}` : '';
}

function timeline(det, flagOf) {
  const evs = [];
  (det.goals || []).forEach(g => evs.push({
    min: g.minute || 0, inj: g.injury,
    html: `${flagOf(g.team)} ⚽ <b>${esc(g.scorer)}</b>` +
          (g.type === 'PENALTY' ? ' (pen)' : g.type === 'OWN' ? ' (og)' : '') +
          (g.assist ? ` <span class="who">assist: ${esc(g.assist)}</span>` : ''),
  }));
  (det.bookings || []).forEach(b => evs.push({
    min: b.minute || 0,
    html: `${flagOf(b.team)} ${b.card === 'RED' || b.card === 'YELLOW_RED' ? '🟥' : '🟨'} ${esc(b.player)}`,
  }));
  (det.substitutions || []).forEach(s => evs.push({
    min: s.minute || 0,
    html: `${flagOf(s.team)} 🔁 <span class="sub-in">${esc(s.in)}</span>
           <span class="who">for</span> <span class="sub-out">${esc(s.out)}</span>`,
  }));
  if (!evs.length) return '';
  evs.sort((x, y) => x.min - y.min);
  const rows = evs.map(e => `<div class="ev">
    <span class="min">${e.min}${e.inj ? '+' + e.inj : ''}'</span><span>${e.html}</span></div>`).join('');
  let pens = '';
  if ((det.penalties || []).length) {
    const list = det.penalties.map(p =>
      `${flagOf(p.team)} ${p.scored ? '✅' : '❌'} ${esc(p.player)}`).join(' · ');
    pens = `<h4>Penalty shootout</h4><div class="meta">${list}</div>`;
  }
  return `<h4>Timeline</h4><div class="tl">${rows}</div>${pens}`;
}

function lineupSide(side, team) {
  if (!side?.lineup?.length) return '';
  const li = p => `<li><span class="no">${p.shirt ?? ''}</span> ${esc(p.name)}
    ${p.position ? `<span class="pos">${esc(p.position)}</span>` : ''}</li>`;
  return `<div class="side">
    <h5>${team.flag} ${esc(team.name)}</h5>
    <div class="form">${side.formation ? esc(side.formation) : ''}
      ${side.coach ? ' · Coach: ' + esc(side.coach) : ''}</div>
    <ul>${side.lineup.map(li).join('')}</ul>
    ${side.bench?.length ? `<div class="bench-h">Bench</div>
      <ul>${side.bench.map(p => `<li class="bench"><span class="no">${p.shirt ?? ''}</span>
        ${esc(p.name)}</li>`).join('')}</ul>` : ''}
  </div>`;
}

function recapText(r, det, d) {
  const hg = r.home.goals, ag = r.away.goals;
  const goals = (det?.goals || []).filter(g => g.minute != null).sort((a, b) => a.minute - b.minute);
  let winner = hg > ag ? r.home : ag > hg ? r.away : null;
  let loser = winner === r.home ? r.away : winner === r.away ? r.home : null;
  let pensBit = '';
  if (!winner && r.note && det?.penalties?.length) {
    const sc = {};
    det.penalties.forEach(p => { if (p.scored) sc[p.team] = (sc[p.team] || 0) + 1; });
    const hw = (sc[r.home.code] || 0) > (sc[r.away.code] || 0);
    winner = hw ? r.home : r.away;
    loser = hw ? r.away : r.home;
    pensBit = ` ${sc[winner.code] || 0}–${sc[loser.code] || 0} on penalties after a ${hg}–${ag} draw`;
  }
  const s = [];
  // sentence 1: the result
  let first;
  if (pensBit) first = `${winner.name} held their nerve to beat ${loser.name}${pensBit}`;
  else if (!winner) first = hg === 0 ? `${r.home.name} and ${r.away.name} played out a goalless draw`
    : `${r.home.name} and ${r.away.name} shared the points in a ${hg}–${ag} draw`;
  else {
    const ws = Math.max(hg, ag), ls = Math.min(hg, ag), diff = ws - ls;
    const verb = diff >= 4 ? 'demolished' : diff === 3 ? 'thrashed'
               : diff === 2 ? 'eased past' : ws + ls >= 3 ? 'edged' : 'beat';
    first = `${winner.name} ${verb} ${loser.name} ${ws}–${ls}`;
  }
  if (det?.venue) first += ` at ${det.venue}`;
  if (det?.attendance) first += ` in front of ${Number(det.attendance).toLocaleString()} fans`;
  s.push(first + '.');
  // sentence 2: an upset?
  const o = r.odds;
  if (winner && o) {
    const wOdds = winner === r.home ? o.home : o.away;
    if (wOdds >= 3) s.push(`A real upset — they had kicked off at ${toFrac(wOdds)} to win.`);
  }
  // sentence 3-4: the goals
  if (goals.length) {
    const g0 = goals[0];
    const scorerTeam = d.teams[g0.team]?.name || '';
    s.push(`${g0.scorer} opened the scoring for ${scorerTeam} on ${g0.minute}'` +
           (g0.type === 'PENALTY' ? ' from the spot' : g0.type === 'OWN' ? ' (an own goal)' : '') + '.');
    if (winner && goals.length > 1) {
      // did the winner trail at any point?
      let h = 0, a = 0, trailed = false;
      goals.forEach(g => {
        if (g.team === r.home.code) h++; else if (g.team === r.away.code) a++;
        const wAhead = winner === r.home ? h - a : a - h;
        if (wAhead < 0) trailed = true;
      });
      const last = goals[goals.length - 1];
      if (trailed) s.push(`${winner.name} came from behind, ${last.scorer} completing the turnaround on ${last.minute}'.`);
      else if (last.team === winner.code && Math.abs(hg - ag) === 1 && !pensBit)
        s.push(`${last.scorer} struck the decisive goal on ${last.minute}'.`);
    }
    const counts = {};
    goals.forEach(g => { if (g.type !== 'OWN') counts[g.scorer] = (counts[g.scorer] || 0) + 1; });
    const multi = Object.entries(counts).find(([, n]) => n >= 2);
    if (multi) s.push(`${multi[0]} finished with ${multi[1] === 2 ? 'a brace' : 'a hat-trick'}.`);
  }
  // sentence 5: red cards
  const reds = (det?.bookings || []).filter(b => b.card === 'RED' || b.card === 'YELLOW_RED');
  if (reds.length) s.push(reds.map(b =>
    `${b.player} (${d.teams[b.team]?.name || ''}) was sent off on ${b.minute}'`).join('; ') + '.');
  // sentence 6: possession flavour
  const hp = det?.home?.stats?.ball_possession, ap = det?.away?.stats?.ball_possession;
  if (hp != null && ap != null && Math.max(hp, ap) >= 62) {
    const dom = hp > ap ? r.home : r.away;
    s.push(`${dom.name} dominated the ball with ${Math.max(hp, ap)}% possession.`);
  }
  return s.join(' ');
}

// decimal -> traditional fractional odds (nearest bookmaker price: 2/5, 7/5, 4/1...)
const FRACS = ['1/20','1/10','1/8','1/6','1/5','2/9','1/4','2/7','3/10','1/3','4/11','2/5',
  '4/9','1/2','8/15','4/7','8/13','2/3','8/11','4/5','5/6','10/11','1/1','11/10','6/5','5/4',
  '11/8','7/5','3/2','13/8','7/4','15/8','2/1','9/4','5/2','11/4','3/1','10/3','7/2','4/1',
  '9/2','5/1','11/2','6/1','13/2','7/1','15/2','8/1','17/2','9/1','10/1','11/1','12/1','14/1',
  '16/1','18/1','20/1','25/1','33/1','40/1','50/1','66/1','100/1']
  .map(f => { const [n, d] = f.split('/').map(Number); return { f, v: n / d }; });

function toFrac(dec) {
  if (dec == null) return '–';
  const v = dec - 1;
  let best = FRACS[0];
  for (const c of FRACS) if (Math.abs(c.v - v) < Math.abs(best.v - v)) best = c;
  return best.f === '1/1' ? 'Evens' : best.f;
}

function oddsBar(o, closing) {
  if (!o) return '';
  return `<div class="oddsrow">
      <span class="odd"><b>Win</b><span class="val">${toFrac(o.home)}</span></span>
      <span class="odd"><b>Draw</b><span class="val">${toFrac(o.draw)}</span></span>
      <span class="odd"><b>Win</b><span class="val">${toFrac(o.away)}</span></span>
      <span class="oddmeta">${closing ? 'pre-match odds' : 'odds'}: ${esc(o.provider)}</span>
    </div>`;
}

function matchCentre(r, d) {
  const det = DETAILS[String(r.id)];
  if (!det) return '<div class="meta">Detailed match data not available yet — it appears a few hours after kick-off.</div>';
  const flagOf = code => d.teams[code]?.flag || '';
  const meta = [det.venue, det.attendance ? det.attendance.toLocaleString() + ' fans' : null,
                det.referee ? 'Referee: ' + det.referee : null].filter(Boolean).join(' · ');
  const sofa = SOFA[String(r.id)];
  const sides = (det.home?.lineup?.length || det.away?.lineup?.length)
    ? det : (sofa?.lineups?.home?.lineup?.length ? sofa.lineups : null);
  const lu = sides
    ? `<h4>Line-ups</h4><div class="lineups">
        ${lineupSide(sides.home, d.teams[r.home.code])}${lineupSide(sides.away, d.teams[r.away.code])}</div>`
    : '';
  const pitchImg = sofa?.pitch
    ? `<h4>Average positions</h4><img class="pitchimg" src="${sofa.pitch}" alt="average positions">`
    : '';
  const recap = recapText(r, det, d);
  return `${recap ? `<h4>Match report</h4><div class="recap">${esc(recap)}</div>` : ''}
    ${meta ? `<div class="meta">${esc(meta)}</div>` : ''}
    ${statBars(det.home?.stats, det.away?.stats)}
    ${pitchImg}
    ${timeline(det, flagOf)}
    ${lu}`;
}

function scorerSummary(r) {
  const det = DETAILS[String(r.id)];
  if (!det?.goals?.length) return '';
  const bySide = side => det.goals.filter(g => g.team === side)
    .map(g => `${esc(g.scorer)} ${g.minute || '?'}'${g.type === 'PENALTY' ? ' (p)' : g.type === 'OWN' ? ' (og)' : ''}`)
    .join(', ');
  const h = bySide(r.home.code), a = bySide(r.away.code);
  if (!h && !a) return '';
  return `<div class="goalscorers"><div>${h ? '⚽ ' + h : ''}</div>
          <div class="away">${a ? a + ' ⚽' : ''}</div></div>`;
}

/* ---------------- matches tab ---------------- */
function renderResults(d) {
  if (!d.results.length && !d.upcoming.length) {
    $('#results').innerHTML = '<div class="empty">No results yet — first match is on 11 June 2026.</div>';
    return;
  }
  const byDay = {};
  d.results.forEach(r => (byDay[r.date] = byDay[r.date] || []).push(r));
  const side = (t, owner, away) => `<div class="t${away ? ' away' : ''}">
      <span class="flag">${t.flag}</span>
      <span><span class="nm">${esc(t.name)}</span>
      <span class="tier t${t.tier}">T${t.tier}</span><br>
      <span class="own">${esc(owner || '')}</span></span></div>`;
  let html = '';
  for (const day of Object.keys(byDay).sort().reverse()) {
    const cards = byDay[day].map(r => {
      const stageLabel = [r.stage, r.group].filter(Boolean).join(' · ');
      return `<div class="match">
      <div class="head"><span>${esc(stageLabel)}</span><span></span></div>
      <div class="scoreline">
        ${side(r.home, d.teams[r.home.code].owner, false)}
        <div class="scorebox">${r.home.goals} – ${r.away.goals}
          ${r.note ? `<small>${esc(r.note)}</small>` : ''}</div>
        ${side(r.away, d.teams[r.away.code].owner, true)}
      </div>
      ${scorerSummary(r)}
      ${oddsBar(r.odds, true)}
      ${r.home.points == null ? '' : `<div class="ptsrow">
        <span>${esc(d.teams[r.home.code].owner || '—')} <b>+${fmt(r.home.points)}</b></span>
        <span><b>+${fmt(r.away.points)}</b> ${esc(d.teams[r.away.code].owner || '—')}</span>
      </div>`}
      <button class="mc-btn" data-mid="${r.id}">Match centre ▾</button>
      <div class="mc" id="mc-${r.id}"></div>
    </div>`;
    }).join('');
    const date = new Date(day + 'T12:00:00Z').toLocaleDateString(undefined,
      { weekday: 'long', day: 'numeric', month: 'long' });
    html += `<div class="day"><h3>${date}</h3>${cards}</div>`;
  }
  if (d.upcoming.length) {
    const form = f => !f ? '' : `<span class="form">${[...f].slice(-5).map(c =>
      `<i class="${c}">${c}</i>`).join('')}</span>`;
    const ups = d.upcoming.map(u => {
      const when = new Date(u.utc).toLocaleString(undefined,
        { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
      const stageLabel = [u.stage, u.group].filter(Boolean).join(' · ');
      const oddsRow = oddsBar(u.odds, false);
      return `<div class="match"><div class="head"><span>${esc(stageLabel)}</span>
        <span>${when}</span></div>
        <div class="scoreline">
          <div class="t"><span class="flag">${u.home.flag}</span>
            <span><span class="nm">${esc(u.home.name)}</span>${form(u.home.form)}<br>
            <span class="own">${esc(u.home.owner || '')}</span></span></div>
          <div class="scorebox">vs</div>
          <div class="t away"><span class="flag">${u.away.flag}</span>
            <span><span class="nm">${esc(u.away.name)}</span>${form(u.away.form)}<br>
            <span class="own">${esc(u.away.owner || '')}</span></span></div>
        </div>${oddsRow}${lineupBlock(u.id, u.home, u.away)}</div>`;
    }).join('');
    html += `<div class="day"><h3>Coming up</h3>${ups}</div>`;
  }
  $('#results').innerHTML = html;

  document.querySelectorAll('.mc-btn').forEach(btn => btn.onclick = () => {
    const panel = $('#mc-' + btn.dataset.mid);
    if (!panel.classList.contains('open') && !panel.innerHTML) {
      const r = d.results.find(x => String(x.id) === btn.dataset.mid);
      panel.innerHTML = matchCentre(r, d);
    }
    panel.classList.toggle('open');
    btn.textContent = panel.classList.contains('open') ? 'Match centre ▴' : 'Match centre ▾';
  });
}

  }).join('');
  $('#groups').innerHTML = `<div class="groupgrid">${tables}</div>
    <p style="color:var(--dim);font-size:.75rem;margin-top:12px;text-align:center">
    Top two in each group qualify automatically; the eight best third-placed teams also advance.
    Group position = sweepstake points: 1st 5 · 2nd 3 · 3rd 1 · 4th 0.</p>`;
}

/* ---------------- teams ---------------- */
function renderTeams(d) {
  const teams = Object.values(d.teams).sort((a, b) => b.total - a.total || a.fifa_rank - b.fifa_rank);
  const rows = teams.map(t => {
    const evs = t.events.map(e =>
      `<div><span>${e.date} · ${esc(e.desc)}</span><span>+${fmt(e.points)}</span></div>`).join('')
      || '<div><span>No points yet</span><span></span></div>';
    const status = t.status === 'champion' ? ' 🏆' : t.status === 'out' ? ' ❌' : '';
    return `<details class="teamcard"><summary>
      <span>${t.flag} <b>${esc(t.name)}</b>${status}</span>
      <span class="tier t${t.tier}">T${t.tier}</span>
      <span class="owner">FIFA #${t.fifa_rank} · ${esc(t.owner || 'unassigned')}</span>
      <span class="grow"></span>
      <span class="owner">${t.won}W ${t.drawn}D ${t.lost}L</span>
      <span class="total">${fmt(t.total)}</span>
    </summary><div class="events">${evs}</div></details>`;
  }).join('');
  $('#teams').innerHTML = rows;
}

/* ---------------- golden boot ---------------- */
function renderScorers(d) {
  if (!d.scorers?.length) {
    $('#scorers').innerHTML = '<div class="empty">Top scorers appear once the goals start flying.</div>';
    return;
  }
  const rows = d.scorers.map((s, i) => `<tr class="${i === 0 ? 'top1' : ''}">
    <td class="rank num">${i === 0 ? '👑' : i + 1}</td>
    <td><b>${esc(s.player)}</b></td>
    <td>${s.flag} ${esc(d.teams[s.team]?.name || '')}</td>
    <td class="hide-sm owner">${esc(s.owner || '—')}</td>
    <td class="num total">${s.goals}</td>
    <td class="num">${s.assists ?? 0}</td></tr>`).join('');
  $('#scorers').innerHTML = `<table>
    <tr><th></th><th>Player</th><th>Team</th><th class="hide-sm">Sweepstake owner</th>
    <th class="num">⚽ Goals</th><th class="num">Assists</th></tr>${rows}</table>`;
}

/* ---------------- rules ---------------- */
function renderRules(d) {
  const s = d.scoring, gp = s.group_position, ko = s.knockout_win;
  const maxTotal = +gp["1"] + ko.LAST_32 + ko.LAST_16 + ko.QUARTER_FINALS + ko.SEMI_FINALS + ko.FINAL;
  $('#rules').innerHTML = `<div class="rules">
    <h3>The draw</h3>
    <p>48 teams ranked by FIFA world ranking, split into three tiers of 16
    (Tier 1 = ranks 1–16, Tier 2 = 17–32, Tier 3 = 33–48). Each of the 16
    players drew <b>one team from every tier</b> — a favourite, a mid-ranker
    and an underdog. That balance is the whole system: every point counts the
    same for everyone, no multipliers.</p>
    <h3>Group stage — finishing position</h3>
    <ul>
      <li>1st in the group: <b>${gp["1"]} pts</b></li>
      <li>2nd: <b>${gp["2"]} pts</b></li>
      <li>3rd: <b>${gp["3"]} pt</b></li>
      <li>4th: <b>${gp["4"]}</b></li>
    </ul>
    <p>The average team banks about 2.25 points here. Positions are scored
    <b>live</b> as group games finish — marked "(live)" on the Teams tab —
    and lock in once all six games in the group are played.</p>
    <h3>Knockout — points per tie won</h3>
    <ul>
      <li>Win your Round of 32 tie: <b>+${ko.LAST_32}</b></li>
      <li>Round of 16: <b>+${ko.LAST_16}</b> · Quarter-final: <b>+${ko.QUARTER_FINALS}</b>
          · Semi-final: <b>+${ko.SEMI_FINALS}</b></li>
      <li>Win the final: <b>+${ko.FINAL}</b></li>
    </ul>
    <p>Winning a penalty shootout counts as winning the tie. The third-place
    play-off carries no points.</p>
    <p style="margin-top:10px">A perfect run — top the group, then win every
    knockout game to the title — is worth <b>${maxTotal} points</b> from one team.
    Your three teams' totals add together.</p>
  </div>`;
}

/* ---------------- boot ---------------- */
let liveTimer = null;
function loadAll() {
  return Promise.all([
    fetch('data.json?t=' + Date.now()).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
    fetch('details.json?t=' + Date.now()).then(r => r.ok ? r.json() : {}).catch(() => ({})),
    fetch('sofascore.json?t=' + Date.now()).then(r => r.ok ? r.json() : {}).catch(() => ({})),
  ]).then(([d, det, sofa]) => {
    DETAILS = det || {}; SOFA = sofa || {};
    const when = new Date(d.generated_at).toLocaleString();
    $('#updated').textContent = `Last updated ${when}` +
      (d.latest_day ? ` · latest results from ${d.latest_day}` : '');
    if (d.mode !== 'live') {
      $('#banner').style.display = 'block';
      $('#banner').textContent = d.mode === 'demo'
        ? '⚠️ DEMO DATA — these are fake results to preview the scoring.'
        : 'Waiting for the tournament to start — results will appear here automatically.';
    }
    renderLive(d); renderLeaderboard(d); renderPodium(d); renderResults(d); renderGroups(d);
    renderBracket(d); renderTeams(d); renderScorers(d); renderRules(d);
    // keep the page fresh while a match is on
    if (d.live?.length && !liveTimer) liveTimer = setInterval(loadAll, 60000);
    if (!d.live?.length && liveTimer) { clearInterval(liveTimer); liveTimer = null; }
  });
}
loadAll().catch(() => { $('#updated').textContent = 'Could not load data.json — run scripts/update_scores.py first.'; });
</script>
</body>
</html>
