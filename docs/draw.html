<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Draw — World Cup 2026 Sweepstake</title>
<style>
  :root {
    --bg0: #050d08; --bg1: #0a1f12; --card: #0e2417; --card2: #143020;
    --line: #1f4630; --line2: #2a5a3e;
    --text: #eef5ef; --dim: #8fb39d; --accent: #36d97c; --gold: #f5c542;
    --t1: #5ec8f8; --t2: #c5a3ff; --t3: #f5c542;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,.012) 0 90px, rgba(0,0,0,.05) 90px 180px),
      linear-gradient(180deg, var(--bg0) 0%, var(--bg1) 40%, #081a0e 100%);
    background-attachment: fixed;
    min-height: 100vh;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 16px; text-align: center; }
  header { padding: 26px 0 4px; }
  header .kick { color: var(--accent); font-size: .72rem; font-weight: 700;
                 letter-spacing: 4px; text-transform: uppercase; }
  h1 { font-size: clamp(1.5rem, 5vw, 2.2rem); font-weight: 900; text-transform: uppercase;
       letter-spacing: 1px; margin: 4px 0 2px; text-shadow: 0 2px 12px rgba(54,217,124,.25); }
  .sub { color: var(--dim); font-size: .85rem; margin-bottom: 18px; }
  a.back { color: var(--accent); font-size: .8rem; text-decoration: none; }

  .tier-banner { display: inline-block; font-weight: 900; letter-spacing: 2px;
                 text-transform: uppercase; font-size: 1rem; border-radius: 999px;
                 padding: 8px 22px; margin: 10px 0 18px; color: #04150b; }
  .tier-banner.t1 { background: var(--t1); } .tier-banner.t2 { background: var(--t2); }
  .tier-banner.t3 { background: var(--t3); }

  /* the wheel */
  .wheelbox { position: relative; width: 270px; height: 270px; margin: 6px auto 20px; }
  .wheel { width: 100%; height: 100%; border-radius: 50%; border: 6px solid var(--line2);
           background: conic-gradient(#36d97c 0 30deg, #0e2417 30deg 60deg, #5ec8f8 60deg 90deg,
             #0e2417 90deg 120deg, #f5c542 120deg 150deg, #0e2417 150deg 180deg,
             #36d97c 180deg 210deg, #0e2417 210deg 240deg, #c5a3ff 240deg 270deg,
             #0e2417 270deg 300deg, #f5c542 300deg 330deg, #0e2417 330deg 360deg);
           box-shadow: 0 0 40px rgba(54,217,124,.18), inset 0 0 30px rgba(0,0,0,.5);
           transition: transform 3.2s cubic-bezier(.12,.65,.18,1); }
  .wheel .hub { position: absolute; inset: 50%; width: 92px; height: 92px;
                transform: translate(-50%, -50%); background: #04150b;
                border: 3px solid var(--line2); border-radius: 50%; display: flex;
                align-items: center; justify-content: center; font-size: 2.4rem; }
  .pointer { position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
             font-size: 1.7rem; z-index: 2; filter: drop-shadow(0 2px 4px rgba(0,0,0,.6)); }

  button.spin { background: var(--accent); color: #04150b; font-weight: 900;
                font-size: 1.05rem; letter-spacing: 2px; text-transform: uppercase;
                border: none; border-radius: 999px; padding: 14px 38px; cursor: pointer;
                box-shadow: 0 4px 24px rgba(54,217,124,.35); transition: transform .1s; }
  button.spin:hover { transform: scale(1.04); }
  button.spin:disabled { opacity: .35; cursor: default; transform: none; }

  /* flashing reveal */
  .reveal { min-height: 64px; margin: 18px auto 8px; max-width: 560px; }
  .reveal .line { font-size: clamp(1.1rem, 4vw, 1.6rem); font-weight: 900; }
  .reveal .line .who { color: var(--gold); }
  .reveal .line .team { color: var(--accent); }
  .reveal .line.flashing .team { color: var(--dim); }
  .reveal .lock { animation: pop .45s ease; }
  @keyframes pop { 0% { transform: scale(.6); opacity: 0; }
                   70% { transform: scale(1.12); } 100% { transform: scale(1); } }

  /* results grid */
  .picks { display: grid; grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
           gap: 8px; margin: 18px 0; text-align: left; }
  .pick { background: var(--card); border: 1px solid var(--line); border-radius: 10px;
          padding: 8px 12px; font-size: .82rem; animation: pop .4s ease; }
  .pick b { display: block; color: var(--gold); }
  .pick .t { white-space: nowrap; }
  .done-actions { margin: 22px 0; display: flex; gap: 10px; justify-content: center;
                  flex-wrap: wrap; }
  .done-actions button { background: var(--card); color: var(--text); border: 1px solid
                         var(--line2); border-radius: 999px; padding: 10px 20px;
                         font-size: .85rem; font-weight: 700; cursor: pointer; }
  .done-actions button:hover { border-color: var(--accent); color: var(--accent); }
  .confetti { font-size: 2rem; letter-spacing: 8px; margin: 8px 0; }
  footer { color: var(--dim); font-size: .72rem; padding: 26px 0; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kick">United 2026 · The Draw</div>
    <h1>🎡 The Sweepstake Draw</h1>
    <div class="sub">Three spins per the rules: everyone gets one Tier&nbsp;1 giant,
      one Tier&nbsp;2 contender, one Tier&nbsp;3 underdog.
      <br><a class="back" href="index.html">← back to the leaderboard</a></div>
  </header>

  <div id="stage"></div>

  <footer>WORLD CUP 2026 SWEEPSTAKE · MAY THE WHEEL BE EVER IN YOUR FAVOUR</footer>
</div>

<script>
const $ = sel => document.querySelector(sel);
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const sleep = ms => new Promise(r => setTimeout(r, ms));
const TIER_NAMES = {1: 'Tier 1 — The Giants', 2: 'Tier 2 — The Contenders', 3: 'Tier 3 — The Underdogs'};

let TEAMS = {}, PLAYERS = [], pools = {}, assignments = {}, round = 1;
// shared mode transports: the mini's /api/draw when served by scripts/serve.py,
// otherwise a public ntfy.sh relay topic — works straight from GitHub Pages.
const NTFY = 'https://ntfy.sh/wc26-sweepstake-draw-spridge-k7q4x9';
let SHARED = false, TRANSPORT = null, lastSeq = 0, busy = false;
const CID = Math.random().toString(36).slice(2);
const queue = [];

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

async function broadcast(ev) {
  if (!SHARED) return;
  const payload = JSON.stringify({ ...ev, origin: CID });
  try {
    if (TRANSPORT === 'api') {
      const r = await fetch('/api/draw', { method: 'POST', body: payload });
      const j = await r.json();
      lastSeq = Math.max(lastSeq, j.seq || 0);
    } else if (TRANSPORT === 'ntfy') {
      await fetch(NTFY, { method: 'POST', body: payload });
    }
  } catch {}
}

async function flashReveal(player, team) {
  const reveal = $('#reveal');
  if (!reveal) return;
  const pool = pools[round] || Object.keys(TEAMS);
  for (let f = 0; f < 14; f++) {
    const fake = pool[Math.floor(Math.random() * pool.length)];
    reveal.innerHTML = `<div class="line flashing"><span class="who">${esc(player)}</span>
      draws… <span class="team">${TEAMS[fake].flag} ${esc(TEAMS[fake].name)}</span></div>`;
    await sleep(45 + f * 14);
  }
  reveal.innerHTML = `<div class="line lock"><span class="who">${esc(player)}</span>
    draws <span class="team">${TEAMS[team].flag} ${esc(TEAMS[team].name)}!</span></div>`;
}

async function applyEvent(ev, animate) {
  if (ev.type === 'reset') { assignments = {}; round = 1; renderRound(); }
  else if (ev.type === 'spin') {
    if (animate && $('#wheel')) {
      $('#spin')?.setAttribute('disabled', '');
      $('#wheel').style.transform = `rotate(${1440 + Math.floor(Math.random() * 360)}deg)`;
      await sleep(3300);
    }
  } else if (ev.type === 'lock') {
    if (animate) { await flashReveal(ev.player, ev.team); await sleep(2400); }
    (assignments[ev.player] = assignments[ev.player] || []).push(ev.team);
    if (animate) renderPicks();
  } else if (ev.type === 'round') {
    round = ev.round;
    if (animate) renderRound();
  }
}

async function drainQueue() {
  if (busy) return;
  busy = true;
  while (queue.length) await applyEvent(queue.shift(), true);
  busy = false;
}

async function poll() {
  try {
    const r = await fetch('/api/draw?since=' + lastSeq);
    if (!r.ok) return;
    const j = await r.json();
    for (const ev of j.events || []) {
      lastSeq = Math.max(lastSeq, ev.seq);
      if (ev.origin !== CID) queue.push(ev);
    }
    drainQueue();
  } catch {}
}

function renderRound() {
  const done = round > 3;
  $('#stage').innerHTML = `
    ${done ? `<div class="confetti">🎉 🏆 🎉</div>
      <div class="tier-banner t3" style="background:var(--gold)">The draw is complete!</div>`
      : `<div class="tier-banner t${round}">${TIER_NAMES[round]}</div>`}
    ${done ? '' : `<div class="wheelbox">
      <div class="pointer">🔻</div>
      <div class="wheel" id="wheel"><div class="hub">⚽</div></div>
    </div>
    <button class="spin" id="spin">Spin the wheel</button>
    <div class="reveal" id="reveal"></div>`}
    <div class="picks" id="picks"></div>
    ${done ? `<div class="done-actions">
      <button id="copy">📋 Copy results</button>
      <button id="dl">⬇️ Download players.json</button>
      <button id="rerun">🔁 Re-run the whole draw</button>
    </div>
    <div class="sub">Send the file (or copied text) to the organiser — drop it in as
      <b>data/players.json</b> and the leaderboard picks it up on the next update.</div>` : ''}
  `;
  renderPicks();
  if (!done) $('#spin').onclick = spin;
  else wireDone();
}

function renderPicks() {
  const grid = $('#picks');
  grid.innerHTML = PLAYERS.map(p => {
    const teams = assignments[p] || [];
    if (!teams.length) return '';
    return `<div class="pick"><b>${esc(p)}</b>${teams.map(c =>
      `<span class="t">${TEAMS[c].flag} ${esc(TEAMS[c].name)}</span>`).join('<br>')}</div>`;
  }).join('');
}

async function spin() {
  const btn = $('#spin');
  btn.disabled = true;
  broadcast({ type: 'spin', round });
  const wheel = $('#wheel');
  const turns = 1440 + Math.floor(Math.random() * 360);
  wheel.style.transform = `rotate(${turns}deg)`;
  await sleep(3300);

  const pool = shuffle([...pools[round]]);
  const order = shuffle([...PLAYERS]);
  const reveal = $('#reveal');
  for (let i = 0; i < order.length; i++) {
    const player = order[i], team = pool[i];
    await flashReveal(player, team);
    (assignments[player] = assignments[player] || []).push(team);
    renderPicks();
    broadcast({ type: 'lock', player, team });
    await sleep(2600);   // hold the name + team on screen so it sinks in
  }
  reveal.innerHTML = `<div class="line lock">That's ${TIER_NAMES[round].split(' — ')[0]} done! 👏</div>`;
  round += 1;
  broadcast({ type: 'round', round });
  await sleep(1400);
  renderRound();
}

function resultsJson() {
  return JSON.stringify({ players: PLAYERS.map(p =>
    ({ name: p, teams: assignments[p] || [] })) }, null, 2) + '\n';
}

function wireDone() {
  $('#copy').onclick = () => {
    const text = PLAYERS.map(p => `${p}: ` + (assignments[p] || []).map(c =>
      `${TEAMS[c].flag} ${TEAMS[c].name}`).join(', ')).join('\n');
    navigator.clipboard.writeText(text);
    $('#copy').textContent = '✅ Copied!';
  };
  $('#dl').onclick = () => {
    const blob = new Blob([resultsJson()], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'players.json';
    a.click();
  };
  $('#rerun').onclick = async () => {
    if (SHARED) { try { await fetch('/api/draw/reset', { method: 'POST' }); } catch {} }
    location.reload();
  };
}

async function boot() {
  const d = await fetch('data.json?t=' + Date.now()).then(r => r.json());
  TEAMS = d.teams;
  PLAYERS = d.players.map(p => p.name);
  for (const t of [1, 2, 3]) pools[t] = Object.values(TEAMS)
    .filter(x => x.tier === t).map(x => x.code);

  // shared mode: prefer the local API (mini), otherwise the public relay —
  // which makes the draw shared even straight from GitHub Pages
  try {
    const r = await fetch('/api/draw');
    if (r.ok) {
      SHARED = true;
      TRANSPORT = 'api';
      const j = await r.json();
      for (const ev of j.events || []) {          // fast-forward history
        lastSeq = Math.max(lastSeq, ev.seq);
        await applyEvent(ev, false);
      }
      setInterval(poll, 1200);
    }
  } catch {}
  if (!TRANSPORT) {
    try {
      const es = new EventSource(NTFY + '/sse?since=12h');
      let settle;
      es.onmessage = e => {
        let m, ev;
        try { m = JSON.parse(e.data); ev = JSON.parse(m.message); } catch { return; }
        if (ev.origin === CID) return;
        if ((Date.now() / 1000 - (m.time || 0)) < 20) {   // fresh: animate it
          queue.push(ev);
          drainQueue();
        } else {                                          // history: fast-forward
          applyEvent(ev, false);
          clearTimeout(settle);
          settle = setTimeout(renderRound, 300);
        }
      };
      SHARED = true;
      TRANSPORT = 'ntfy';
    } catch {}
  }
  renderRound();
  const note = document.createElement('div');
  note.className = 'sub';
  note.textContent = SHARED
    ? '🟢 Shared draw — everyone on this page sees the same spins, live.'
    : '⚪️ Solo mode — spins only show on this screen.';
  $('#stage').after(note);
}
boot().catch(() => { $('#stage').innerHTML = '<div class="sub">Could not load data.json — start the site first.</div>'; });
</script>
</body>
</html>
