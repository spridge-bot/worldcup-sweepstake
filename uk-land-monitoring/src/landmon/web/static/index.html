<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Land Monitor — storage buildings &amp; activity</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="sidebar">
    <h1>Land Monitor</h1>
    <p class="sub">Tagged storage buildings, coloured by estimated activity.</p>

    <div class="legend">
      <div class="legend-title">Activity level</div>
      <div class="legend-bar"></div>
      <div class="legend-labels"><span>Idle</span><span>Busy</span></div>
      <p class="note" id="activity-note"></p>
    </div>

    <div class="filters">
      <label><input type="checkbox" class="cls" value="farm_storage" checked> Farm storage</label>
      <label><input type="checkbox" class="cls" value="industrial_storage" checked> Industrial storage</label>
      <label><input type="checkbox" class="cls" value="possible_storage" checked> Possible storage</label>
    </div>

    <div id="list"></div>
    <p class="src" id="src"></p>
  </div>

  <div id="map">
    <div id="timebar" class="hidden">
      <button id="play" title="Play / pause">▶</button>
      <input id="slider" type="range" min="0" max="0" value="0" step="1" />
      <span id="datelabel">—</span>
      <label class="chiptoggle"><input type="checkbox" id="showchips" checked> imagery chips</label>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="/static/app.js"></script>
</body>
</html>
